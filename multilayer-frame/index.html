    const AI_FALLBACK = `I'm not sure how to help with that. Here are some things I can assist with:

- **How-to questions**: "How can I generate a floor plan?" or "How to use the pen tool?"
- **Tool guidance**: Ask about [Wall|wall], [Room|room], [Stair|stair], or any other tool
- **AI features**: Ask me to generate layouts, furnish rooms, or suggest improvements
- **Finding features**: "Where can I find the export option?"

Try rephrasing your question or search for a tool in the command bar.`;

    function getAIResponse(query) {
      for (const r of AI_RESPONSES) {
        if (r.test.test(query)) return r.text;
      }
      return AI_FALLBACK;
    }

    // Maps badge action IDs → CMD_ICONS keys for the inline icon
    const BADGE_ICON_MAP = {
      cursor:        'select',
      frame:         'frame',
      rectangle:     'shape',
      connect:       'path',
      wall:          'wall',
      room:          'room',
      stair:         'stair',
      ruler:         'ruler',
      pen:           'pen',
      text:          'text',
      maximize:      'fit',
      'mode-draft':  'grid',
      'mode-polish': 'ai',
    };

    // Parses [Label|id] into a clickable tool-badge chip, **text** into <strong>
    function formatInline(text) {
      return text
        .replace(/\[([^\]|]+)\|([^\]]+)\]/g, (_, label, id) => {
          const iconKey = BADGE_ICON_MAP[id];
          const iconSvg = iconKey ? (CMD_ICONS[iconKey] || '') : '';
          return `<span class="tool-badge" data-badge-id="${id}">${iconSvg}${label}</span>`;
        })
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    }

    function markdownToHTML(text) {
      const lines = text.split('\n');
      let html = '';
      let inOl = false;
      let inUl = false;
      for (const line of lines) {
        const olMatch = line.match(/^(\d+)\.\s+(.*)/);
        if (olMatch) {
          if (inUl)  { html += '</ul>'; inUl = false; }
          if (!inOl) { html += '<ol>'; inOl = true; }
          html += `<li>${formatInline(olMatch[2])}</li>`;
          continue;
        }
        if (inOl) { html += '</ol>'; inOl = false; }
        const ulMatch = line.match(/^-\s+(.*)/);
        if (ulMatch) {
          if (!inUl) { html += '<ul>'; inUl = true; }
          html += `<li>${formatInline(ulMatch[1])}</li>`;
          continue;
        }
        if (inUl) { html += '</ul>'; inUl = false; }
        if (line.trim() === '') continue;
        html += `<p>${formatInline(line)}</p>`;
      }
      if (inOl) html += '</ol>';
      if (inUl) html += '</ul>';
      return html;
    }

    // Streams parsed HTML into a container element, token by token.
    // HTML tags are consumed instantly (they're structural); text tokens
    // are revealed one at a time to create the streaming typewriter effect.
    // Tool-badge <span> elements are treated as single atomic tokens so the
    // entire badge (icon + label) pops in at once rather than piece by piece.
    function streamHTMLInto(containerEl, html, msPerToken) {
      const tokens = [];
      let rest = html;
      while (rest.length > 0) {
        // Badge spans: consume everything from <span class="tool-badge" to </span> as one unit
        if (rest.startsWith('<span class="tool-badge"')) {
          const end = rest.indexOf('</span>') + 7;
          tokens.push({ tag: true, val: rest.slice(0, end) });
          rest = rest.slice(end);
        } else if (rest[0] === '<') {
          const end = rest.indexOf('>') + 1;
          tokens.push({ tag: true, val: rest.slice(0, end) });
          rest = rest.slice(end);
        } else {
          const m = rest.match(/^(\s+|[^\s<]+)/);
          if (m) { tokens.push({ tag: false, val: m[0] }); rest = rest.slice(m[0].length); }
          else   { tokens.push({ tag: false, val: rest[0] }); rest = rest.slice(1); }
        }
      }
      let idx = 0;
      let built = '';
      containerEl.innerHTML = '<span class="odin-cursor"></span>';
      return setInterval(() => {
        if (idx >= tokens.length) {
          clearInterval(aiStreamInterval);
          aiStreamInterval = null;
          containerEl.innerHTML = html;
          return;
        }
        // Consume one text token, then skip any immediately following tags
        built += tokens[idx].val; idx++;
        while (idx < tokens.length && tokens[idx].tag) { built += tokens[idx].val; idx++; }
        containerEl.innerHTML = built + '<span class="odin-cursor"></span>';
      }, msPerToken);
    }

    function cancelAIStream() {
      clearTimeout(aiDebounceTimer);
      if (aiStreamInterval) { clearInterval(aiStreamInterval); aiStreamInterval = null; }
    }

    // Called when a tool-badge inside an AI response is clicked
    function handleBadgeClick(id, closeAfter = true) {
      if (id.startsWith('mode-')) {
        setActiveMode(id.replace('mode-', ''));
      } else if (TOOL_META[id]) {
        setActiveTool(id);

    // Small sparkle icon for the Odin response header
    const ODIN_RESPONSE_ICON = `<svg viewBox="0 0 16 16" fill="none" width="13" height="13"><path d="M8 1.5L9.2 5.5L13.5 4.5L10.5 7.5L14.5 9L10.5 9.5L11.5 13.5L8 11L4.5 13.5L5.5 9.5L1.5 9L5.5 7.5L2.5 4.5L6.8 5.5L8 1.5Z" stroke="rgba(255,255,255,0.28)" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

    function makeDraggable(el, handle) {
      let startX, startY, startLeft, startTop;
      handle.addEventListener('mousedown', (e) => {
        if (e.target.closest('.odin-pin-close, .odin-ai-header-btn')) return;
        e.preventDefault();
        const rect = el.getBoundingClientRect();
        startX = e.clientX; startY = e.clientY;
        startLeft = rect.left; startTop = rect.top;
        // Convert right-anchored to left-anchored so delta math is simple
        el.style.right = 'auto';
        el.style.left  = startLeft + 'px';
        el.style.top   = startTop  + 'px';
        handle.style.cursor = 'grabbing';
        const onMove = (e) => {
          el.style.left = (startLeft + e.clientX - startX) + 'px';
          el.style.top  = (startTop  + e.clientY - startY) + 'px';
        };
        const onUp = () => {
          handle.style.cursor = 'grab';
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup',   onUp);
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup',   onUp);
      });

    const AI_SEND_ICON = `<svg viewBox="0 0 14 14" fill="none"><path d="M1 7H13M9 3L13 7L9 11" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const AI_MINIMIZE_ICON = `<svg viewBox="0 0 10 2" width="10" height="10" fill="none"><path d="M1 1H9" stroke="currentColor" stroke-linecap="round"/></svg>`;

    function createAIPanel() {
      const panel = document.createElement('div');
      panel.className = 'odin-ai-panel';
      panel.innerHTML = `
        <div class="odin-ai-header">
          ${ODIN_RESPONSE_ICON}
          <span class="odin-ai-header-label">Odin AI</span>
          <div class="odin-ai-header-btn odin-ai-minimize" title="Minimize">${AI_MINIMIZE_ICON}</div>

        if (e.key === 'Escape') { e.stopPropagation(); input.blur(); }

      panel.querySelector('.odin-ai-send-btn').addEventListener('click', () => {
        const q = input.value.trim();
        if (q) { sendAIMessage(q); input.value = ''; }

      panel.querySelector('.odin-ai-messages').addEventListener('click', (e) => {
        const badge = e.target.closest('.tool-badge');
        if (badge) { e.stopPropagation(); handleBadgeClick(badge.dataset.badgeId, false); }
      });

      panel.addEventListener('click', e => e.stopPropagation());
    }

    function closeAIOverlay() {
      if (!aiPanelEl) return;
      cancelAIStream();
      aiPanelEl.remove();
      aiPanelEl = null;
      aiPanelOpen = false;
      aiPanelMinimized = false;
      aiMessages = [];

    function minimizeAIOverlay() {
      if (!aiPanelEl) return;
      aiPanelMinimized = !aiPanelMinimized;
      aiPanelEl.classList.toggle('minimized', aiPanelMinimized);

    function sendAIMessage(query) {
      cancelAIStream();
      aiMessages.push({ role: 'user', content: query });
      const responseText = getAIResponse(query);
      const responseHTML = markdownToHTML(responseText);

    function renderAIMessages(streamLast) {
      const container = aiPanelEl.querySelector('.odin-ai-messages');
      let html = '';

        const msg = aiMessages[i];

          if (streamLast && isLast) {
            html += `<div class="odin-ai-msg assistant" data-stream-target></div>`;
          } else {
            html += `<div class="odin-ai-msg assistant">${msg.content}</div>`;
          }
        }
      }
      container.innerHTML = html;
      if (streamLast) {
        const target = container.querySelector('[data-stream-target]');
        if (target) {
          const lastMsg = aiMessages[aiMessages.length - 1];
          aiStreamInterval = streamHTMLInto(target, lastMsg.content, 20);
        }
      }
      container.scrollTop = container.scrollHeight;
      setTimeout(() => { container.scrollTop = container.scrollHeight; }, 100);
    }

    // ── Quick action parsing ─────────────────────────────────────────────
    const QA_ICON = `<svg viewBox="0 0 16 16" fill="none" width="12" height="12"><path d="M9.5 1.5L4 9H8L6.5 14.5L12 7H8L9.5 1.5Z" stroke="#6ba5f5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const QUICK_ACTION_PATTERNS = [
      { test: /^wall\s+(\d+)\s*(cm|mm|m)?$/i,   format: m => `Set wall thickness to ${m[1]}${m[2]||'cm'}`, icon: 'wall' },
      { test: /^rotate\s+(\d+)\s*°?$/i,          format: m => `Rotate selection ${m[1]}°`,                  icon: 'reverse' },
      { test: /^grid\s+(\d+)\s*(px|mm|cm)?$/i,   format: m => `Set grid to ${m[1]}${m[2]||'px'}`,          icon: 'grid' },
      { test: /^zoom\s+(\d+)\s*%?$/i,            format: m => `Zoom to ${m[1]}%`,                           icon: 'fit' },
      { test: /^snap\s+(on|off|toggle)$/i,        format: m => `Snap: ${m[1]}`,                              icon: 'snap' },
    ];

    function matchQuickAction(query) {
      for (const qa of QUICK_ACTION_PATTERNS) {
        const m = query.match(qa.test);
        if (m) return { match: m, pattern: qa };
      }
      return null;
    }

    function renderQuickAction(qa) {
      const iconSvg = CMD_ICONS[qa.pattern.icon] || CMD_ICONS.select;
      const label = qa.pattern.format(qa.match);
      return `<div class="command-section">${QA_ICON} Quick action</div>
        <div class="quick-action-item command-item" data-quick-action="true">
          <div class="command-icon">${iconSvg}</div>
          <span class="command-text">${label}</span>
          <span class="qa-badge">⏎ Run</span>
        </div>`;
    }

    // ── Command palette ──────────────────────────────────────────────────
    function renderPalette(filter) {
      paletteSelectedIndex = -1;
      const f = filter.toLowerCase().trim();
      let contentHtml = '';

      // Recently used section (only when not filtering)
      if (!f && recentlyUsed.length > 0) {
        contentHtml += `<div class="command-section">Recently used</div>`;
        contentHtml += recentlyUsed.map(r => {
          if (r.type === 'tool') return renderToolItem({ id: r.id, name: r.name, icon: r.icon, shortcut: '', mode: r.mode });
          if (r.type === 'asset') return renderAssetItem({ name: r.name, icon: r.icon, tag: r.tag || '' });
          return renderCommandItem({ name: r.name, icon: r.icon, shortcut: '', mode: r.mode });
        }).join('');
      }

      // Quick action detection (only when filtering)
      let qaHtml = '';
      if (f) {
        const qa = matchQuickAction(commandInput.value.trim());
        if (qa) qaHtml = renderQuickAction(qa);
      }

      // Unified: commands + assets
      const cmdHtml = renderCommandsContent(f);
      const assetHtml = renderAssetsContent(f);
      if (qaHtml) contentHtml += qaHtml;
      contentHtml += cmdHtml + assetHtml;

      cancelAIStream();

      // No results hint (only if no quick action either)
      if (!cmdHtml && !assetHtml && !qaHtml && f) {
        contentHtml = `<div class="palette-hint">No results — press <kbd>Enter</kbd> to ask Odin AI</div>`;
      }

      commandDropdown.innerHTML = `<div class="palette-content">${contentHtml}</div>`;
      commandDropdown.classList.add('visible');
    }

    function renderCommandsContent(f) {
      let html = '';
      if (!f) {
        // Context-aware tool commands
        const toolCmds = TOOL_COMMANDS[activeToolId] || [];
        const toolLabel = activeToolId.charAt(0).toUpperCase() + activeToolId.slice(1);
        if (toolCmds.length) {
          html += `<div class="command-section">${toolLabel} tool</div>`;
          html += toolCmds.map(renderCommandItem).join('');
        }
        // All tools
        html += `<div class="command-section">Tools</div>`;
        html += TOOLBAR_TOOLS.map(renderToolItem).join('');
        // General + AI
        html += `<div class="command-section">General</div>`;
        html += GENERAL_COMMANDS.map(renderCommandItem).join('');
        html += `<div class="command-section">AI Actions</div>`;
        html += AI_COMMANDS.map(renderCommandItem).join('');
      } else {
        // Commands + tools in filtered results
        const allCmds = [
          ...(TOOL_COMMANDS[activeToolId] || []),
          ...GENERAL_COMMANDS,
          ...AI_COMMANDS,
          ...Object.entries(TOOL_COMMANDS)
            .filter(([k]) => k !== activeToolId)
            .flatMap(([, cmds]) => cmds),
        ];
        const filteredCmds  = sortByUsage(allCmds.filter(c => matchesFilter(c, f)));
        const filteredTools = sortByUsage(TOOLBAR_TOOLS.filter(t => matchesFilter(t, f)));
        if (filteredCmds.length === 0 && filteredTools.length === 0) return '';
        html  = filteredTools.map(renderToolItem).join('');
        html += filteredCmds.map(renderCommandItem).join('');
      }
      return html;
    }

    function renderAssetsContent(f) {
      let html = '';
      const sections = [
        { key: 'components', label: 'Components' },
        { key: 'furniture',  label: 'Furniture' },
        { key: 'fixtures',   label: 'Fixtures' },
        { key: 'materials',  label: 'Materials' },
      ];

      if (!f) {
        for (const s of sections) {
          const items = ASSETS[s.key] || [];
          if (items.length) {
            html += `<div class="command-section">${s.label}</div>`;
            html += items.map(renderAssetItem).join('');
          }
        }
      } else {
        const all = Object.values(ASSETS).flat();
        const filtered = sortByUsage(all.filter(a => matchesFilter(a, f) || a.tag.toLowerCase().includes(f)));
        if (filtered.length === 0) return '';
        html = filtered.map(renderAssetItem).join('');
      }
      return html;
    }

    // ── Set active tool ───────────────────────────────────────────────────

      const prev = activeToolId;
      toolsPill.querySelectorAll('.tool-icon.active').forEach(el => el.classList.remove('active'));

      if (btn) { btn.classList.add('active'); activeToolId = id; }

    function getPaletteItems() {
      return [...commandDropdown.querySelectorAll('.command-item, .asset-item')];
    }

    function setPaletteSelection(index) {
      const items = getPaletteItems();
      items.forEach(el => el.classList.remove('palette-selected'));
      if (!items.length) { paletteSelectedIndex = -1; return; }
      paletteSelectedIndex = (index + items.length) % items.length;
      const el = items[paletteSelectedIndex];
      el.classList.add('palette-selected');
      el.scrollIntoView({ block: 'nearest' });
    }

    function clearPaletteSelection() {
      getPaletteItems().forEach(el => el.classList.remove('palette-selected'));
      paletteSelectedIndex = -1;
    }

    function activatePaletteSelection() {
      const items = getPaletteItems();
      if (paletteSelectedIndex < 0 || !items[paletteSelectedIndex]) return false;
      items[paletteSelectedIndex].click();
      return true;
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && isSearchOpen) {
        if (commandDropdown.classList.contains('visible')) closePalette();
        else closeSearch();
        return;
      }
      if (e.key === '/' && !isSearchOpen && document.activeElement.tagName !== 'INPUT') {
        e.preventDefault(); openSearch(); return;
      }
      // Polyline drawing shortcuts
      if (!isSearchOpen && activeToolId === 'connect') {
        if (e.key === 'Enter' && plDrawing)   { e.preventDefault(); plCompleteDraw(); return; }
        if (e.key === 'Escape' && plDrawing)  { plClear(); return; }
        if (e.key === 'Escape' && plHasShape) { plFreezeShape(); plClear(); hideCtxBar(); return; }
      }
      if (!isSearchOpen) return;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        setPaletteSelection(paletteSelectedIndex + 1);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        setPaletteSelection(paletteSelectedIndex - 1);
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (!activatePaletteSelection()) {
          const query = commandInput.value.trim();
          if (query) { openAIOverlay(query); closeSearch(); }
        }
      }
    });

    commandDropdown.addEventListener('click', (e) => {
      // Badge clicks
      const badge = e.target.closest('.tool-badge');
      if (badge) { e.stopPropagation(); handleBadgeClick(badge.dataset.badgeId); return; }

      // Quick action execution
      const qaItem = e.target.closest('.quick-action-item');
      if (qaItem) {
        e.stopPropagation();
        closeSearch();
        return;
      }

      // Command items — tool-select vs action
      const cmdItem = e.target.closest('.command-item');
      if (cmdItem) {
        e.stopPropagation();
        if (cmdItem.dataset.toolSelect) {
          const toolId = cmdItem.dataset.toolSelect;
          const t = TOOLBAR_TOOLS.find(t => t.id === toolId);
          if (t) trackRecentUse({ type: 'tool', id: t.id, name: t.name, icon: t.icon, mode: t.mode });

        } else {
          if (cmdItem.dataset.cmdName) {
            trackRecentUse({ type: 'command', name: cmdItem.dataset.cmdName, icon: cmdItem.dataset.cmdIcon || 'select', mode: cmdItem.dataset.cmdMode });
          }
          closeSearch();
        }
        return;
      }

      // Asset items
      const assetItem = e.target.closest('.asset-item');
      if (assetItem) {
        e.stopPropagation();
        if (assetItem.dataset.assetName) {
          trackRecentUse({ type: 'asset', name: assetItem.dataset.assetName, icon: assetItem.dataset.assetIcon, tag: assetItem.dataset.assetTag });
        }
        closeSearch();
        return;
      }
    });

        const isActive = activeSubItem[toolId] === item.id;
        return `
          <div class="submenu-item${isActive ? ' active' : ''}" data-item="${item.id}" data-group="${toolId}">
            <div class="submenu-check">${isActive ? CHECKMARK : ''}</div>
            <div class="submenu-icon">${item.icon}</div>
            <span class="submenu-label">${item.label}</span>
            <span class="submenu-shortcut">${item.shortcut}</span>
          </div>`;
      }).join('');

      // Position above the anchor (tool button)
      toolSubmenu.style.visibility = 'hidden';
      toolSubmenu.classList.add('visible');
      const anchorRect = anchorEl.getBoundingClientRect();
      const menuRect = toolSubmenu.getBoundingClientRect();
      const gap = 8;
      // Left-align menu with the left edge of the chevron button, clamped to viewport
      const chevronRect = anchorEl.querySelector('.tool-chevron').getBoundingClientRect();
      let left = chevronRect.left;
      left = Math.max(8, Math.min(left, window.innerWidth - menuRect.width - 8));
      const top = anchorRect.top - menuRect.height - gap;
      toolSubmenu.style.left = left + 'px';
      toolSubmenu.style.top  = top + 'px';
      toolSubmenu.style.visibility = '';

      // Item click
      toolSubmenu.querySelectorAll('.submenu-item').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          const group = el.dataset.group;
          const itemId = el.dataset.item;
          activeSubItem[group] = itemId;
          closeSubmenu();
          // Multilayer Frame sub-option: convert existing frame
          if (itemId === 'frame-multilayer' && !isMultilayer) {
            convertToMultilayer();
          }
        });
      });
    }

    function closeSubmenu() {
      toolSubmenu.classList.remove('visible');
      activeSubmenuTool = null;
      if (activeChevron) { activeChevron.classList.remove('active'); activeChevron = null; }
    }

    // Chevron click handlers
    toolsPill.querySelectorAll('.tool-chevron').forEach(chevron => {
      chevron.addEventListener('click', (e) => {
        e.stopPropagation();
        const toolBtn = chevron.closest('.tool-btn');
        const toolId  = toolBtn?.dataset.tool;
        if (!toolId || !SUBMENUS[toolId]) return;
        if (activeSubmenuTool === toolId) { closeSubmenu(); return; }
        openSubmenu(toolId, toolBtn);
      });
    });

    // Close on outside click / Escape
    document.addEventListener('click', () => closeSubmenu());
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSubmenu(); });
    toolSubmenu.addEventListener('click', e => e.stopPropagation());

    // ── Toolbar Tooltips ──────────────────────────────────────────────────
    const TOOL_META = {
      cursor:    { name: 'Cursor',    shortcut: 'V' },
      frame:     { name: 'Frame',     shortcut: 'F' },
      rectangle: { name: 'Rectangle', shortcut: 'R' },
      connect:   { name: 'Polyline',  shortcut: 'P' },
      wall:      { name: 'Wall',      shortcut: 'W' },
      room:      { name: 'Room',      shortcut: ''  },
      stair:     { name: 'Stair',     shortcut: 'S' },
      ruler:     { name: 'Ruler',     shortcut: 'M' },
      pen:       { name: 'Pen',       shortcut: ''  },
      text:      { name: 'Text',      shortcut: 'T' },
      maximize:  { name: 'View',      shortcut: ''  },
    };

    const ttEl = document.getElementById('toolbarTooltip');
    let ttTimer = null;
    let lastTooltipHide = 0;
    const TT_DELAY = 350;
    const TT_WARM = 300; // if last tooltip was <300ms ago, show immediately

    function ttDelay() {
      return (Date.now() - lastTooltipHide < TT_WARM) ? 0 : TT_DELAY;
    }

    function showTooltip(anchorIcon, toolId) {
      const meta = TOOL_META[toolId];
      if (!meta) return;

      ttEl.innerHTML = `<span class="tt-name">${meta.name}</span>${meta.shortcut ? `<span class="tt-shortcut">${meta.shortcut}</span>` : ''}`;

      // Measure after content is set
      ttEl.style.visibility = 'hidden';
      ttEl.classList.add('visible');
      const ttRect     = ttEl.getBoundingClientRect();
      const iconRect   = anchorIcon.getBoundingClientRect();
      const gap        = 8;
      const left       = iconRect.left + iconRect.width / 2 - ttRect.width / 2;
      const top        = iconRect.top - ttRect.height - gap;

      ttEl.style.left  = Math.max(8, Math.min(left, window.innerWidth - ttRect.width - 8)) + 'px';
      ttEl.style.top   = top + 'px';
      ttEl.style.visibility = '';
    }

    function hideTooltip() {
      clearTimeout(ttTimer);
      lastTooltipHide = Date.now();
      ttEl.classList.remove('visible');
    }

    // Generic tooltip positioner: anchor element + HTML content
    function showTooltipAt(anchorEl, html) {
      ttEl.innerHTML = html;
      ttEl.style.visibility = 'hidden';
      ttEl.classList.add('visible');
      const ttRect   = ttEl.getBoundingClientRect();
      const elRect   = anchorEl.getBoundingClientRect();
      const left     = elRect.left + elRect.width / 2 - ttRect.width / 2;
      let top        = elRect.top - ttRect.height - 8;
      // If tooltip goes above viewport, show below the anchor instead
      if (top < 8) top = elRect.bottom + 8;
      ttEl.style.left = Math.max(8, Math.min(left, window.innerWidth - ttRect.width - 8)) + 'px';
      ttEl.style.top  = top + 'px';
      ttEl.style.visibility = '';
    }

    toolsPill.querySelectorAll('.tool-btn').forEach(btn => {
      const toolId   = btn.dataset.tool;
      const iconEl   = btn.querySelector('.tool-icon');

      btn.addEventListener('mouseenter', () => {
        clearTimeout(ttTimer);
        ttTimer = setTimeout(() => showTooltip(iconEl, toolId), ttDelay());
      });
      btn.addEventListener('mouseleave', () => {
        clearTimeout(ttTimer);
        hideTooltip();
      });
      btn.addEventListener('click', hideTooltip);
    });

    // ── Mode pill tooltips ─────────────────────────────────────────────────
    [draftModeBtn, polishModeBtn].forEach(btn => {
      const label = btn.id === 'draftModeBtn' ? 'Draft Mode' : 'Polish Mode';
      btn.addEventListener('mouseenter', () => {
        clearTimeout(ttTimer);
        ttTimer = setTimeout(() => showTooltipAt(btn, `<span class="tt-name">${label}</span>`), ttDelay());
      });
      btn.addEventListener('mouseleave', () => { clearTimeout(ttTimer); hideTooltip(); });
      btn.addEventListener('click', hideTooltip);
    });

    // ═══════════════════════════════════════════════════════════════════════
    // ── Polyline Drawing Engine ────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    const polylineSVG  = document.getElementById('polylineSVG');
    const plPathEl     = document.getElementById('plPath');
    const plPreviewEl  = document.getElementById('plPreview');
    const plDotsEl     = document.getElementById('plDots');
    const plCompletedG = document.getElementById('plCompleted');
    const polyCtxBar   = document.getElementById('polylineCtxBar');

    // Prevent ctx-bar clicks from closing the Odin palette
    polyCtxBar.addEventListener('click', e => e.stopPropagation());

    // Drawing state
    let plPts      = [];      // [{x, y}] — current polyline's vertices
    let plDrawing  = false;   // true while user is clicking to place points
    let plHasShape = false;   // true after completion — context bar visible

    // Context bar state (persists across polylines)
    let plStroke   = '#1573e5';
    let plWeight   = 2;
    let plSegType  = 'straight'; // 'straight' | 'arc'
    let plClosed   = false;
    let plSnapAng  = false;

    // ── Path builder ────────────────────────────────────────────────────────
    function plBuildD(pts, closed) {
      if (pts.length < 1) return '';
      let d = `M ${pts[0].x} ${pts[0].y}`;
      if (plSegType === 'straight') {
        for (let i = 1; i < pts.length; i++) d += ` L ${pts[i].x} ${pts[i].y}`;
      } else {
        // Smooth S-curves through each node (cubic bezier, midpoint control)
        for (let i = 1; i < pts.length; i++) {
          const p0 = pts[i - 1], p1 = pts[i];
          const mx = (p0.x + p1.x) / 2;
          d += ` C ${mx} ${p0.y} ${mx} ${p1.y} ${p1.x} ${p1.y}`;
        }
      }
      if (closed && pts.length > 2) d += ' Z';
      return d;
    }

    // ── Render helpers ──────────────────────────────────────────────────────
    function plRender() {
      const d = plBuildD(plPts, plClosed);
      plPathEl.setAttribute('d', d);
      plPathEl.setAttribute('stroke', plStroke);
      plPathEl.setAttribute('stroke-width', plWeight);
      plDotsEl.innerHTML = plPts.map((p, i) => {
        const isFirst = i === 0;
        return `<circle cx="${p.x}" cy="${p.y}" r="${isFirst ? 4.5 : 3.5}"
          fill="${isFirst ? plStroke : 'rgba(21,23,25,0.88)'}"
          stroke="${plStroke}" stroke-width="1.5" style="cursor:default"/>`;
      }).join('');
    }

    function plRenderPreview(mx, my) {
      if (!plDrawing || plPts.length === 0) { plPreviewEl.setAttribute('d', ''); return; }
      let [ex, ey] = [mx, my];
      const last = plPts[plPts.length - 1];
      if (plSnapAng) { const s = plSnap(last.x, last.y, mx, my); ex = s.x; ey = s.y; }
      plPreviewEl.setAttribute('d', `M ${last.x} ${last.y} L ${ex} ${ey}`);
      plPreviewEl.setAttribute('stroke', plStroke);
      plPreviewEl.setAttribute('stroke-width', plWeight);
    }

    function plSnap(ox, oy, mx, my) {
      const dx = mx - ox, dy = my - oy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 1) return { x: mx, y: my };
      const angle   = Math.atan2(dy, dx);
      const snapped = Math.round(angle / (Math.PI / 4)) * (Math.PI / 4);
      return {
        x: Math.round(ox + Math.cos(snapped) * dist),
        y: Math.round(oy + Math.sin(snapped) * dist),
      };
    }

    // ── State management ────────────────────────────────────────────────────
    function plActivate() {
      document.body.classList.add('tool-connect');
    }

    function plDeactivate() {
      document.body.classList.remove('tool-connect');
      if (plHasShape || (plDrawing && plPts.length >= 2)) plFreezeShape();
      plClear();
      plSnapAng = false;
      hideCtxBar();
    }

    function plClear() {
      plPts      = [];
      plDrawing  = false;
      plHasShape = false;
      plClosed   = false;
      plPathEl.setAttribute('d', '');
      plPreviewEl.setAttribute('d', '');
      plDotsEl.innerHTML = '';
    }

    function plFreezeShape() {
      if (plPts.length < 2) return;
      const el = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      el.setAttribute('d',               plBuildD(plPts, plClosed));
      el.setAttribute('fill',            'none');
      el.setAttribute('stroke',          plStroke);
      el.setAttribute('stroke-width',    plWeight);
      el.setAttribute('stroke-linecap',  'round');
      el.setAttribute('stroke-linejoin', 'round');
      plCompletedG.appendChild(el);
    }

    // ── Complete drawing ────────────────────────────────────────────────────
    function plCompleteDraw() {
      if (plPts.length < 2) { plClear(); return; }
      plDrawing = false;
      plHasShape = true;
      plPreviewEl.setAttribute('d', '');
      plRender();
      showCtxBar();
    }

    // ── Context bar ─────────────────────────────────────────────────────────
    function showCtxBar() {
      polyCtxBar.classList.add('visible');
      syncCtxBar();
      // If search bar is expanded, slide ctx bar to the right of it
      if (isSearchOpen) {
        const searchW = parseFloat(searchPill.style.width) || searchPill.getBoundingClientRect().width;
        const finalSearchRight = searchPill.getBoundingClientRect().left + searchW;
        const ctxTx = finalSearchRight + 12 - window.innerWidth / 2;
        polyCtxBar.style.transform = `translateX(${ctxTx}px) translateY(0)`;
      }
    }
    function hideCtxBar() { polyCtxBar.classList.remove('visible'); polyCtxBar.style.transform = ''; }

    function syncCtxBar() {
      document.getElementById('ctxSegStraight').classList.toggle('active', plSegType === 'straight');
      document.getElementById('ctxSegArc').classList.toggle('active',      plSegType === 'arc');
      document.getElementById('ctxWeightLabel').textContent = plWeight;
      polyCtxBar.querySelectorAll('.ctx-swatch').forEach(sw =>
        sw.classList.toggle('active', sw.dataset.color === plStroke));
    }

    // ── SVG interaction ─────────────────────────────────────────────────────
    polylineSVG.addEventListener('mousemove', (e) => {
      if (!plDrawing) return;
      const r = polylineSVG.getBoundingClientRect();
      plRenderPreview(e.clientX - r.left, e.clientY - r.top);
    });

    polylineSVG.addEventListener('click', (e) => {
      if (activeToolId !== 'connect') return;
      if (isSearchOpen && commandDropdown.classList.contains('visible')) return;
      if (e.detail === 2) return;  // second click of dblclick — ignore
      if (e.target.closest('.toolbar-container, .polyline-ctx-bar')) return;

      const r = polylineSVG.getBoundingClientRect();
      let x = e.clientX - r.left;
      let y = e.clientY - r.top;

      if (plSnapAng && plPts.length > 0) {
        const last = plPts[plPts.length - 1];
        const s = plSnap(last.x, last.y, x, y);
        x = s.x; y = s.y;
      }

      if (!plDrawing) {
        // Freeze any completed shape, start fresh
        if (plHasShape) { plFreezeShape(); plClear(); }
        plDrawing  = true;
        plHasShape = false;
        plClosed   = false;
        hideCtxBar();
        plPts = [{ x, y }];
        plRender();
      } else {
        plPts.push({ x, y });
        plRender();
      }
    });

    polylineSVG.addEventListener('dblclick', (e) => {
      if (!plDrawing || plPts.length < 2) return;
      e.preventDefault();
      plCompleteDraw();
    });

    polylineSVG.addEventListener('contextmenu', e => e.preventDefault());

    // Stop propagation when palette is not visible — prevents document handler
    // from closing the search bar while user is drawing on the canvas
    polylineSVG.addEventListener('click', e => {
      if (activeToolId === 'connect' && !commandDropdown.classList.contains('visible')) e.stopPropagation();
    });

    // Context bar does not propagate to document click handlers
    polyCtxBar.addEventListener('click', e => e.stopPropagation());

    // ── Context bar buttons ─────────────────────────────────────────────────
    document.getElementById('ctxSegStraight').addEventListener('click', () => {
      plSegType = 'straight'; syncCtxBar(); if (plHasShape) plRender();
    });
    document.getElementById('ctxSegArc').addEventListener('click', () => {
      plSegType = 'arc'; syncCtxBar(); if (plHasShape) plRender();
    });

    document.getElementById('ctxWeightMinus').addEventListener('click', () => {
      plWeight = Math.max(1, plWeight - 1);
      syncCtxBar(); if (plHasShape || plDrawing) plRender();
    });
    document.getElementById('ctxWeightPlus').addEventListener('click', () => {
      plWeight = Math.min(8, plWeight + 1);
      syncCtxBar(); if (plHasShape || plDrawing) plRender();
    });

    polyCtxBar.querySelectorAll('.ctx-swatch').forEach(sw => {
      sw.addEventListener('click', () => {
        plStroke = sw.dataset.color;
        syncCtxBar();
        if (plHasShape || plDrawing) plRender();
      });
    });

    // ── Bootstrap: activate polyline mode if connect tool is the default ─────
    // if (activeToolId === 'connect') plActivate(); // disabled — start in Select mode

    // ══════════════════════════════════════════════════════════════════════════
    // ── Multilayer Frame System ──────────────────────────────────────────────
    // ══════════════════════════════════════════════════════════════════════════

    const canvasFrame = document.getElementById('canvasFrame');
    const frameConvertBtn = document.getElementById('frameConvertBtn');
    // Primary floor nav (interactive, for the active/hovered frame)
    const floorNav = document.getElementById('floorNavMain');
    // Secondary floor nav (dimmed snapshot for the other frame)
    const floorNavGhost = document.getElementById('floorNavTower');
    let ghostNavOwner = null; // which frame the ghost nav belongs to
    const secondaryToolbar = document.getElementById('secondaryToolbar');
    const pdfSecondaryToolbar = document.getElementById('pdfSecondaryToolbar');
    const propertiesPanel = document.getElementById('propertiesPanel');
    const propClose = document.getElementById('propClose');
    const frameName = document.getElementById('frameName');
    const frameGhost = document.getElementById('frameGhost');
    const pdfFrame = document.getElementById('pdfFrame');
    const towerFrame = document.getElementById('towerFrame');
    const towerFrameName = document.getElementById('towerFrameName');
    const towerGhost = document.getElementById('towerGhost');

    let selectedFrame = null; // 'main' | 'tower' | 'pdf' | null
    let isMultilayer = false;
    let activeFloor = 0;

    // ── Per-frame state (swapped when selecting a frame) ──
    const frameData = {
      main: {
        name: 'Residence Block A',
        isMultilayer: false,
        floors: [{ id: 0, label: 'GF', name: 'Ground Floor' }],
        activeFloor: 0,
        floorHeights: { 0: '4.20' },
      },
      tower: {
        name: 'Tower B',
        isMultilayer: true,
        floors: [],
        activeFloor: 0,
        floorHeights: {},
      }
    };

    // Populate Tower B with 25 floors
    for (let i = -2; i <= 22; i++) {
      let label, name;
      if (i < 0) { label = `B${Math.abs(i)}`; name = `Basement ${Math.abs(i)}`; }
      else if (i === 0) { label = 'GF'; name = 'Ground Floor'; }
      else { label = `F${i}`; name = `Floor ${i}`; }
      frameData.tower.floors.push({ id: i, label, name });
      if (i < 0) frameData.tower.floorHeights[i] = '3.50';
      else if (i === 0) frameData.tower.floorHeights[i] = '4.20';
      else if (i <= 3) frameData.tower.floorHeights[i] = '2.80';
      else frameData.tower.floorHeights[i] = '2.60';
    }

    // Global FLOORS/FLOOR_HEIGHTS point to the active frame's data
    let FLOORS = frameData.main.floors;
    let FLOOR_HEIGHTS = frameData.main.floorHeights;

    let currentFrameKey = null;

    function loadFrameData(key) {
      // Save current globals back to previous frame before switching
      if (currentFrameKey && frameData[currentFrameKey]) {
        const prev = frameData[currentFrameKey];
        prev.floors = FLOORS;
        prev.floorHeights = FLOOR_HEIGHTS;
        prev.activeFloor = activeFloor;
        prev.isMultilayer = isMultilayer;
      }
      currentFrameKey = key;
      const d = frameData[key];
      FLOORS = d.floors;
      FLOOR_HEIGHTS = d.floorHeights;
      activeFloor = d.activeFloor;
      isMultilayer = d.isMultilayer;
    }

    // ── Frame Selection ──
    function collapseIfExploded() {
      if (isPdfExploded && pdfExplodedGroup) {
        removeExplodedGroup(pdfExplodedGroup);
        pdfExplodedGroup = null;
        isPdfExploded = false;
        pdfFrame.style.display = '';
        pageNav.style.display = '';
        pdfExplodeBtn.innerHTML = EXPLODE_ICON; pdfExplodeBtn.title = 'Explode';
      }
    }

    function selectMainFrame() {
      collapseIfExploded();
      clearSelection();
      loadFrameData('main');
      selectedFrame = 'main';
      canvasFrame.classList.add('selected');
      propertiesPanel.classList.add('visible');
      floorNav.classList.remove('visible');
      syncToolbars();
      const activeFloorObj = FLOORS.find(f => f.id === activeFloor);
      if (isMultilayer) {
        positionFloorNav(canvasFrame);
        floorNav.classList.add('visible', 'active');
        buildFloorDom();
        panelContent.innerHTML = renderFrameSection(frameData.main.name, true)
          + renderFloorSection(activeFloorObj)
          + renderExportSection();
        wireFloorActions();
        wireExportActions();
      } else {
        floorNav.classList.remove('visible', 'active');
        panelContent.innerHTML = renderFrameSection(frameData.main.name);
      }
    }

    function selectTowerFrame() {
      collapseIfExploded();
      clearSelection();
      loadFrameData('tower');
      selectedFrame = 'tower';
      towerFrame.classList.add('selected');
      propertiesPanel.classList.add('visible');
      positionFloorNav(towerFrame);
      floorNav.classList.add('visible', 'active');
      buildFloorDom();
      syncToolbars();
      const activeFloorObj = FLOORS.find(f => f.id === activeFloor);
      panelContent.innerHTML = renderFrameSection(frameData.tower.name, true)
        + renderFloorSection(activeFloorObj)
        + renderExportSection();
      wireFloorActions();
      wireExportActions();
    }

    let floorNavOwner = null; // 'main' or 'tower' — which frame the nav is attached to
    let floorNavFrame = null; // DOM element the floor nav tracks

    function positionFloorNav(frameEl) {
      const newOwner = frameEl === towerFrame ? 'tower' : 'main';
      // Only snap if actually switching to a different frame
      if (newOwner !== floorNavOwner) {
        if (springAnim) { cancelAnimationFrame(springAnim); springAnim = null; }
        floorNavSnap = true;
      }
      floorNavFrame = frameEl;
      floorNavOwner = newOwner;
      updateOverlayPositions();
    }

    let _overlayRafId = null;
    function updateOverlayPositions() {
      if (_overlayRafId) return; // already scheduled — coalesce rapid calls
      _overlayRafId = requestAnimationFrame(_syncOverlayPositions);
    }
    function _syncOverlayPositions() {
      _overlayRafId = null;
      // Floor selector bar — 8px gap left of frame, vertically centered
      if (floorNavFrame && floorNav.classList.contains('visible')) {
        const r = floorNavFrame.getBoundingClientRect();
        floorNav.style.left = (r.left - 36 - 8) + 'px';
        floorNav.style.top = r.top + 'px';
        floorNav.style.height = r.height + 'px';
      }
      // Ghost floor selector bar — dimmed bar for the other frame (never show if same as primary)
      if (ghostNavOwner === floorNavOwner) floorNavGhost.classList.remove('visible');
      if (ghostNavOwner && ghostNavOwner !== floorNavOwner && floorNavGhost.classList.contains('visible')) {
        const ghostFrameEl = ghostNavOwner === 'tower' ? towerFrame : canvasFrame;
        const r = ghostFrameEl.getBoundingClientRect();
        floorNavGhost.style.left = (r.left - 36 - 8) + 'px';
        floorNavGhost.style.top = r.top + 'px';
        floorNavGhost.style.height = r.height + 'px';
      }
      // Page nav — centered below PDF frame (pageNav defined later, guard against undefined)
      const pn = document.getElementById('pageNav');
      if (pn && pn.classList.contains('visible')) {
        const r = pdfFrame.getBoundingClientRect();
        const navW = pn.offsetWidth;
        pn.style.left = (r.left + r.width / 2 - navW / 2) + 'px';
        pn.style.top = (r.bottom + 8) + 'px';
      }
    }

    function selectPdfFrame() {
      collapseIfExploded();
      clearSelection();
      selectedFrame = 'pdf';
      pdfFrame.classList.add('selected');
      propertiesPanel.classList.add('visible');
      pageNav.classList.add('active');
      syncToolbars();
      panelContent.innerHTML = renderFrameSection('Section A-A')
        + renderExportSection();
      wireExportActions();
    }

    let focusedGroup = null; // 'ml' | 'pdf' | null — which exploded group is active

    // Active canvas frame — points to whichever multilayer frame is currently selected
    function getActiveFrame() {
      return selectedFrame === 'tower' ? towerFrame : canvasFrame;
    }
    function getActiveGhost() {
      return selectedFrame === 'tower' ? towerGhost : frameGhost;
    }
    function getActiveFrameName() {
      return selectedFrame === 'tower' ? frameData.tower.name : frameData.main.name;
    }

    function clearSelection() {
      selectedFrame = null;
      canvasFrame.classList.remove('selected');
      towerFrame.classList.remove('selected');
      pdfFrame.classList.remove('selected');
      if (selectedExplodedFrame) {
        selectedExplodedFrame.classList.remove('selected');
        selectedExplodedFrame = null;
      }
      if (pdfExplodedGroup) pdfExplodedGroup.classList.remove('group-selected');
    }

    // Show only the toolbar for the focused group, hide others
    function syncToolbars() {
      if ((selectedFrame === 'main' && isMultilayer) || selectedFrame === 'tower') {
        secondaryToolbar.classList.add('visible');
      } else {
        secondaryToolbar.classList.remove('visible');
      }
      if (selectedFrame === 'pdf') {
        pdfSecondaryToolbar.classList.add('visible');
      } else if (!isPdfExploded) {
        pdfSecondaryToolbar.classList.remove('visible');
      }
    }

    function selectExplodedGroup(type) {
      clearSelection();
      focusedGroup = type;
      const label = type === 'ml' ? getActiveFrameName() : 'Section A-A';
      propertiesPanel.classList.add('visible');
      syncToolbars();
      // Group selected → show Format/Size/Scale, no Ghost (exploded = no ghost)
      panelContent.innerHTML = renderFrameSection(label, { showGhost: false, showFormat: true })
        + renderExportSection();

    function deselectAll() {
      clearSelection();

      // Deselect section cut marks
      canvasFrame.querySelectorAll('.section-cut-mark').forEach(m => {
        m.style.opacity = '';
        m._selected = false;
      });

      propertiesPanel.classList.remove('visible');
      syncToolbars();

      // Save current state before deselecting
      if (currentFrameKey && frameData[currentFrameKey]) {
        frameData[currentFrameKey].floors = FLOORS;
        frameData[currentFrameKey].floorHeights = FLOOR_HEIGHTS;
        frameData[currentFrameKey].activeFloor = activeFloor;
        frameData[currentFrameKey].isMultilayer = isMultilayer;
      }

      // Keep floor navs + page nav visible but dimmed
      floorNav.classList.remove('active');
      // Primary nav becomes a ghost for its current owner
      if (floorNavOwner && frameData[floorNavOwner].isMultilayer) {
        floorNav.classList.add('visible');
      }
      pageNav.classList.remove('active');
    }

    canvasFrame.addEventListener('click', (e) => {
      e.stopPropagation();
      selectMainFrame();
    });

    // Hover on multilayer frame → activate floor nav
    let hoverNavFrame = null;
    let floorNavLocked = false;

    function isNavSticky() {
      return floorNavLocked || selectedFrame === floorNavOwner;
    }

    // Switch nav to a different frame (only rebuilds if owner changes)
    function switchNavTo(frameKey, frameEl) {
      if (floorNavOwner === frameKey) return; // already showing this frame

      // Save current nav as dimmed ghost for the old frame before switching
      if (floorNavOwner && frameData[floorNavOwner].isMultilayer) {
        const ghostTrack = floorNavGhost.querySelector('.floor-dots-track');
        ghostTrack.innerHTML = floorNavTrack.innerHTML;
        const ghostViewport = floorNavGhost.querySelector('.floor-dots-viewport');
        ghostViewport.style.height = floorNavViewport.style.height;
        ghostTrack.style.transform = floorNavTrack.style.transform;
        floorNavGhost.classList.add('visible');
        floorNavGhost.classList.remove('active');
        ghostNavOwner = floorNavOwner;
      }

      // Hide ghost if it belongs to the frame we're switching TO (no overlap)
      if (ghostNavOwner === frameKey) {
        floorNavGhost.classList.remove('visible');
        ghostNavOwner = null;
      }

      loadFrameData(frameKey);
      positionFloorNav(frameEl);
      buildFloorDom();
      // After rebuild, snap the track to correct position (no animation)
      const total = floorEls.length;
      const visCount = Math.min(MAX_VIS, total);
      const activeIdx = floorEls.findIndex(e => e.id === activeFloor);
      let scrollIdx = activeIdx - Math.floor(visCount / 2);
      scrollIdx = Math.max(0, Math.min(scrollIdx, total - visCount));
      currentTrackY = -scrollIdx * ITEM_H;
      floorNavTrack.style.transform = `translateY(${currentTrackY}px)`;
    }

    function handleFrameHover(frameKey, frameEl) {
      frameEl.addEventListener('mouseenter', () => {
        if (selectedFrame === frameKey) return;
        if (!frameData[frameKey].isMultilayer) return;
        hoverNavFrame = frameKey;
        switchNavTo(frameKey, frameEl);
        floorNav.classList.add('visible', 'active');
        frameEl.classList.add('nav-hover');
        updateOverlayPositions();
      });
      frameEl.addEventListener('mouseleave', () => {
        if (selectedFrame === frameKey) return;
        hoverNavFrame = null;
        frameEl.classList.remove('nav-hover');
        setTimeout(() => {
          if (hoverNavFrame || isNavSticky()) return;
          floorNav.classList.remove('active');
          floorNav.classList.add('visible');
          // Hide ghost if it's at the same frame as primary (prevent double)
          if (ghostNavOwner === floorNavOwner) {
            floorNavGhost.classList.remove('visible');
          }
          updateOverlayPositions();
        }, 100);
      });

    handleFrameHover('main', canvasFrame);
    handleFrameHover('tower', towerFrame);

    // Floor nav hover keeps it active
    floorNav.addEventListener('mouseenter', () => {

      floorNav.classList.add('active');

        const frameEl = floorNavOwner === 'tower' ? towerFrame : canvasFrame;
        frameEl.classList.add('nav-hover');
      }

    floorNav.addEventListener('mouseleave', () => {
      if (isNavSticky()) return;
      hoverNavFrame = null;
      if (floorNavOwner) {
        const frameEl = floorNavOwner === 'tower' ? towerFrame : canvasFrame;
        frameEl.classList.remove('nav-hover');

      setTimeout(() => {
        if (hoverNavFrame || isNavSticky()) return;
        floorNav.classList.remove('active');
      }, 100);

    // Scroll wheel on floor nav → navigate between floors
    let lastFloorWheelTime = 0;
    floorNav.addEventListener('wheel', (e) => {
      e.preventDefault();
      e.stopPropagation();
      const now = Date.now();
      if (now - lastFloorWheelTime < 50) return;
      lastFloorWheelTime = now;

      if (!FLOORS || FLOORS.length < 2) return;
      const sorted = FLOORS.slice().sort((a, b) => a.id - b.id);
      const currentIdx = sorted.findIndex(f => f.id === activeFloor);
      if (currentIdx === -1) return;

      let newIdx;
      if (e.deltaY > 0) {
        // scroll down → next floor (lower id)
        newIdx = currentIdx - 1;
      } else {
        // scroll up → previous floor (higher id)
        newIdx = currentIdx + 1;
      }
      if (newIdx < 0 || newIdx >= sorted.length) return;
      setActiveFloor(sorted[newIdx].id);

    // Click-hold-drag on floor dots → scrub through floors
    let floorDragActive = false;

    floorNavViewport.addEventListener('mousedown', (e) => {
      if (!floorNav.classList.contains('active')) return;

      e.stopPropagation();
      floorDragActive = true;
      document.body.style.cursor = 'grabbing';
      document.body.style.userSelect = 'none';
    });

    document.addEventListener('mousemove', (e) => {
      if (!floorDragActive) return;
      // Find which dot item is closest to cursor Y
      const items = floorNav.querySelectorAll('.floor-dot-item');
      let closestId = activeFloor;
      let closestDist = Infinity;
      items.forEach(item => {
        const rect = item.getBoundingClientRect();
        const centerY = rect.top + rect.height / 2;
        const dist = Math.abs(e.clientY - centerY);
        if (dist < closestDist) {
          closestDist = dist;
          const el = floorEls.find(fe => fe.item === item);
          if (el) closestId = el.id;
        }
      });
      if (closestId !== activeFloor) {
        setActiveFloor(closestId);
      }
    });

    document.addEventListener('mouseup', () => {
      if (floorDragActive) {

    function convertToMultilayer() {
      // Add F1 above GF
      frameData.main.isMultilayer = true;
      frameData.main.floors = [
        { id: 0, label: 'GF', name: 'Ground Floor' },
        { id: 1, label: 'F1', name: 'Floor 1' },

      frameData.main.floorHeights[1] = '2.80';
      frameData.main.activeFloor = 1;

      isMultilayer = true;

      FLOOR_HEIGHTS = frameData.main.floorHeights;
      activeFloor = 1;

      canvasFrame.classList.add('multilayer');
      selectMainFrame();

      // Entrance animation for floor nav: fade in + slide from right
      floorNav.style.transition = 'none';
      floorNav.style.opacity = '0';
      floorNav.style.transform = 'translateX(8px)';

      floorNav.style.transition = 'opacity 300ms cubic-bezier(0.25, 1, 0.5, 1), transform 300ms cubic-bezier(0.25, 1, 0.5, 1)';
      floorNav.style.opacity = '1';
      floorNav.style.transform = 'translateX(0)';
      setTimeout(() => {
        floorNav.style.transition = '';

        floorNav.style.transform = '';

    // ── Floor Navigation (windowed) ──
    const floorNavTrack = floorNav.querySelector('.floor-dots-track');
    const floorNavViewport = floorNav.querySelector('.floor-dots-viewport');

    const ITEM_H = 14;     // px per floor item (matches CSS height)
    const MAX_VIS = 14;
    const FADE_N = 3;       // edge items that fade
    let floorEls = [];      // [{id, item, line}] in order high→low (top→bottom)

    function buildFloorDom() {
      floorNavTrack.innerHTML = '';
      floorEls = [];

      // Cancel running spring animation (rebuild resets DOM)
      if (springAnim) { cancelAnimationFrame(springAnim); springAnim = null; }

      // Remove old counter if exists
      const oldCounter = floorNav.querySelector('.floor-nav-counter');
      if (oldCounter) oldCounter.remove();

      // High floor at top, low at bottom
      const sorted = FLOORS.slice().sort((a, b) => b.id - a.id);
      sorted.forEach(floor => {
        const item = document.createElement('div');
        item.className = 'floor-dot-item';
        const label = document.createElement('span');
        label.className = 'floor-dot-label';
        label.textContent = floor.label;
        const line = document.createElement('div');
        line.className = 'floor-dot';
        item.appendChild(label);
        item.appendChild(line);
        item.addEventListener('mousedown', (e) => e.stopPropagation());
        item.addEventListener('click', (e) => {
          e.stopPropagation();
          setActiveFloor(floor.id);
        });
        floorNavTrack.appendChild(item);
        floorEls.push({ id: floor.id, item, line });
      });

      // Add counter below nav (only if >7 floors)
      if (FLOORS.length > 7) {
        const counter = document.createElement('div');
        counter.className = 'floor-nav-counter';
        counter.id = 'floorNavCounter';
        floorNav.appendChild(counter);

        counter.addEventListener('mousedown', (e) => e.stopPropagation());
        counter.addEventListener('click', (e) => {
          e.stopPropagation();
          // Replace counter text with input
          const currentIdx = FLOORS.findIndex(f => f.id === activeFloor) + 1;
          counter.innerHTML = '';
          const inp = document.createElement('input');
          inp.className = 'floor-nav-counter-input';
          inp.type = 'text';
          inp.maxLength = 4;
          inp.placeholder = currentIdx.toString();
          counter.appendChild(inp);
          inp.focus();
          floorNavLocked = true;

          inp.addEventListener('mousedown', (ev) => ev.stopPropagation());
          inp.addEventListener('click', (ev) => ev.stopPropagation());
          inp.addEventListener('keydown', (ev) => {
            ev.stopPropagation();
            if (ev.key === 'Enter') {
              const num = parseInt(inp.value.trim());
              floorNavLocked = false;
              if (!isNaN(num)) {
                let floor = FLOORS.find(f => f.id === num);
                if (!floor) {
                  const ln = floorLabelForId(num);
                  floor = { id: num, label: ln.label, name: ln.name };
                  FLOORS.push(floor);
                  FLOORS.sort((a, b) => a.id - b.id);
                  FLOOR_HEIGHTS[num] = '2.80';
                  buildFloorDom();
                }
                setActiveFloor(num);
              } else {
                updateFloorCounter();
              }
            }
            if (ev.key === 'Escape') { floorNavLocked = false; updateFloorCounter(); }
          });
          inp.addEventListener('blur', () => {
            floorNavLocked = false;
            setTimeout(updateFloorCounter, 100);
          });
        });
      }

      applyFloorNav();
    }

    function updateFloorCounter() {
      const counter = document.getElementById('floorNavCounter');
      if (!counter) return;
      const total = floorEls.length;
      // Find which floor is active by checking the DOM
      const activeEl = floorEls.find(e => e.item.classList.contains('active'));
      // floorEls is high→low, reverse for low→high index
      const sortedEls = floorEls.slice().reverse();
      const currentIdx = activeEl ? sortedEls.indexOf(activeEl) + 1 : 1;
      counter.innerHTML = `<span class="counter-current">${currentIdx}</span><span class="counter-sep">/</span>${total}`;
    }

    // ── Spring animation engine ──
    let springAnim = null;
    let currentTrackY = 0;
    let floorNavSnap = false; // when true, next applyFloorNav snaps instead of animating

    function springTo(targetY, jumpDistance) {
      if (springAnim) cancelAnimationFrame(springAnim);

      // Duration scales with jump distance: short jump = snappy, long jump = smooth
      const clampedDist = Math.min(Math.abs(jumpDistance), 20);
      const tension = 300 - clampedDist * 8;   // 300 (snappy) → 140 (soft)
      const friction = 20 + clampedDist * 0.5;  // 20 → 30

      let velocity = 0;
      const mass = 1;
      let pos = currentTrackY;
      const target = targetY;

      function tick() {
        const displacement = pos - target;
        const springForce = -tension * displacement;
        const dampingForce = -friction * velocity;
        const acceleration = (springForce + dampingForce) / mass;

        velocity += acceleration * 0.016; // ~60fps timestep
        pos += velocity * 0.016;

        currentTrackY = pos;
        floorNavTrack.style.transform = `translateY(${pos}px)`;

        // Stop when settled
        if (Math.abs(velocity) < 0.5 && Math.abs(pos - target) < 0.3) {
          currentTrackY = target;
          floorNavTrack.style.transform = `translateY(${target}px)`;
          springAnim = null;
          return;
        }
        springAnim = requestAnimationFrame(tick);
      }
      springAnim = requestAnimationFrame(tick);
    }

    function applyFloorNav() {
      const total = floorEls.length;
      const visCount = Math.min(MAX_VIS, total);

      // Viewport height = visible items
      floorNavViewport.style.height = (visCount * ITEM_H) + 'px';

      // Find active floor index (in floorEls, which is high→low)
      const activeIdx = floorEls.findIndex(e => e.id === activeFloor);

      // Center active floor: calculate translateY offset
      let scrollIdx = activeIdx - Math.floor(visCount / 2);
      scrollIdx = Math.max(0, Math.min(scrollIdx, total - visCount));

      const targetY = -scrollIdx * ITEM_H;
      const jumpDistance = Math.abs(targetY - currentTrackY) / ITEM_H;

      // Snap after rebuild, animate otherwise
      if (floorNavSnap || jumpDistance < 0.5) {
        currentTrackY = targetY;
        floorNavTrack.style.transform = `translateY(${targetY}px)`;
        floorNavSnap = false;
      } else {
        springTo(targetY, jumpDistance);
      }

      // Edge fading: items near top/bottom of visible window get smaller
      const moreTop = scrollIdx > 0;
      const moreBottom = scrollIdx + visCount < total;

      floorEls.forEach((el, i) => {
        const isActive = el.id === activeFloor;
        el.item.classList.toggle('active', isActive);

        const visPos = i - scrollIdx;

        if (isActive) {
          el.line.style.width = '8px';
          el.line.style.height = '8px';
          el.line.style.opacity = '1';
          el.line.style.background = '';
          return;
        }

        let scale = 1;
        if (moreTop && visPos < FADE_N) {
          scale = Math.min(scale, 0.15 + 0.85 * (visPos / FADE_N));
        }
        if (moreBottom && visPos > visCount - 1 - FADE_N) {
          const fromBottom = visCount - 1 - visPos;
          scale = Math.min(scale, 0.15 + 0.85 * (fromBottom / FADE_N));
        }

        el.line.style.width = Math.max(3, Math.round(6 * scale)) + 'px';
        el.line.style.height = Math.max(3, Math.round(6 * scale)) + 'px';
        el.line.style.opacity = (0.2 + 0.8 * scale).toFixed(2);
        el.line.style.background = '';
      });
      updateFloorCounter();
    }

    function setActiveFloor(floorId) {
      activeFloor = floorId;
      const floor = FLOORS.find(f => f.id === floorId);
      const nameText = floor ? floor.name : `Floor ${floorId}`;

      if (selectedFrame === 'main' && isMultilayer) {

    }

    // Copy to ghost nav as dimmed, hide primary

    floorNav.addEventListener('click', (e) => {

    let pdfExplodedGroup = null;

    let selectedExplodedFrame = null; // currently selected individual frame in a group

          <rect x="15" y="135" width="50" height="8" rx="1" stroke="#ccc" stroke-width="0.5" fill="#e8e8e6"/>
          <text x="90" y="230" text-anchor="middle" fill="#bbb" font-size="9" font-family="Inter">${item.label}</text>
        </svg>`;
        frame.appendChild(content);

        // Click individual frame → show floor-level properties
        frame.addEventListener('click', (e) => {
          e.stopPropagation();
          if (selectedExplodedFrame) selectedExplodedFrame.classList.remove('selected');
          frame.classList.add('selected');
          selectedExplodedFrame = frame;
          group.classList.remove('group-selected');
          focusedGroup = groupType;
          propertiesPanel.classList.add('visible');
          syncToolbars();

          // Show floor properties for this specific frame (no Format/Size/Scale — those are group-level)
          const floorId = parseInt(frame.dataset.floorId);
          const floorObj = FLOORS.find(f => f.id === floorId);
          panelContent.innerHTML = renderFrameSection(getActiveFrameName(), { showGhost: false, showFormat: false })
            + renderFloorSection(floorObj)
            + renderExportSection();
          wireFloorActions();
          wireExportActions();
        });

        group.appendChild(frame);
      });

      // Click on group background (dotted border) → select group, show frame-level properties
      group.addEventListener('click', (e) => {
        e.stopPropagation();
        if (selectedExplodedFrame) {
          selectedExplodedFrame.classList.remove('selected');
          selectedExplodedFrame = null;
        }
        group.classList.add('group-selected');
        focusedGroup = groupType;
        propertiesPanel.classList.add('visible');
        syncToolbars();
        panelContent.innerHTML = renderFrameSection(getActiveFrameName(), { showGhost: false, showFormat: true })
          + renderExportSection();
        wireExportActions();
      });

      document.querySelector('.canvas').appendChild(group);
      return group;
    }

    function removeExplodedGroup(group) {
      if (group && group.parentNode) group.parentNode.removeChild(group);
      clearSelection();
    }

    // Multilayer Explode — one-way export: creates independent frames to the right
    function handleExplode() {
      const af = getActiveFrame();
      const posLeft = parseInt(af.style.left) || af.offsetLeft;
      const posTop = parseInt(af.style.top) || af.offsetTop;
      const items = FLOORS.slice().sort((a,b) => a.id - b.id).map(f => ({ label: f.name, floorId: f.id }));

      // Create independent frames to the right of the original
      const startX = posLeft + af.offsetWidth + 40;
      items.forEach((item, i) => {
        const frame = document.createElement('div');
        frame.className = 'generated-frame';
        frame.style.cssText = `left:${startX + i * 230}px;top:${posTop}px;width:200px;height:${af.offsetHeight}px;`;

        const label = document.createElement('div');
        label.className = 'generated-frame-label';
        label.textContent = item.label;
        frame.appendChild(label);

        // Simple floor plan content
        const h = af.offsetHeight;
        frame.innerHTML += `<div style="position:absolute;inset:8px;"><svg viewBox="0 0 184 ${h-16}" fill="none" style="width:100%;height:100%;">
          <rect x="2" y="2" width="180" height="${h-20}" stroke="#2a2a2a" stroke-width="2" rx="1"/>
          <line x1="60" y1="2" x2="60" y2="${h-18}" stroke="#999"/>
          <line x1="2" y1="${(h-16)/2}" x2="182" y2="${(h-16)/2}" stroke="#999"/>
          <rect x="10" y="15" width="35" height="50" rx="2" stroke="#ccc" stroke-width=".5" fill="none"/>
          <text x="92" y="${h-26}" text-anchor="middle" fill="#bbb" font-size="9" font-family="Inter">${item.label}</text>
        </svg></div>`;

        frame.addEventListener('click', (e) => {
          e.stopPropagation();
          deselectAll();
          frame.classList.add('selected');
          propertiesPanel.classList.add('visible');
          const floorObj = FLOORS.find(f => f.id === item.floorId);
          panelContent.innerHTML = renderFrameSection(getActiveFrameName(), { showGhost: false, showFormat: false })
            + renderFloorSection(floorObj)
            + renderExportSection();
          wireFloorActions();
          wireExportActions();
        });

        document.querySelector('.canvas').appendChild(frame);
        generatedFrames.push(frame);
      });
    }

    // ── Floor Selector Bar Buttons ──
    // Wire all .fsb-add buttons (both bars) to the Add Floor logic
    document.querySelectorAll('.fsb-add').forEach(btn => {
      let fsbTtTimer = null;

            f.name = ln.name;
          }
        });
        const shiftedIds = Object.keys(FLOOR_HEIGHTS).map(Number).filter(k => k >= newId).sort((a, b) => b - a);
        shiftedIds.forEach(k => { FLOOR_HEIGHTS[k + 1] = FLOOR_HEIGHTS[k]; delete FLOOR_HEIGHTS[k]; });
        FLOOR_HEIGHTS[newId] = '2.80';
        const ln = floorLabelForId(newId);

    // Wire all .fsb-explode buttons to the one-way export

    // ── Keyboard shortcut: Escape to deselect ──
    document.addEventListener('keydown', (e) => {

        return;
      }
      if (e.key === 'Escape' && compassEl) {

      }
      if (e.key === 'Escape' && !isSearchOpen) {
        if (selectedExplodedFrame) {
