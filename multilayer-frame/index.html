    // ══════════════════════════════════════════════════════════════════
    // ── Section Cut Flow ─────────────────────────────────────────────
    // ══════════════════════════════════════════════════════════════════

    let sectionMode = 'idle'; // 'idle' | 'drawing' | 'choosing'
    let sectionStart = null;
    let sectionEnd = null;
    let sectionLineEl = null;
    let sectionCount = 0;
    const generatedFrames = [];

    const secSectionBtn = document.getElementById('secSectionCut');
    const canvasDim = document.getElementById('canvasDim');
    const modeBar = document.getElementById('modeInstructionBar');
    const modeTitle = document.getElementById('modeTitle');
    const modeText = document.getElementById('modeText');

    function showModeUI(title, text) {
      modeTitle.textContent = title;
      modeText.textContent = text;
      canvasDim.classList.add('visible');
      modeBar.classList.add('visible');
    }

    function updateModeText(text) {
      modeText.textContent = text;
    }

    function hideModeUI() {
      canvasDim.classList.remove('visible');
      modeBar.classList.remove('visible');
    }

    let sectionTargetFrame = null; // which frame the section cut is being drawn on

    function startSectionCut() {
      sectionMode = 'drawing';
      sectionStart = null;
      sectionEnd = null;
      sectionTargetFrame = getActiveFrame();
      document.body.classList.add('mode-section-cut');
      secSectionBtn.classList.add('active-mode');

      showModeUI('Section Cut', 'Click a point on the floor plan to start');

      sectionLineEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      sectionLineEl.classList.add('section-cut-line');
      sectionLineEl.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;';
      sectionTargetFrame.appendChild(sectionLineEl);
    }

    function cancelSectionCut() {
      sectionMode = 'idle';
      document.body.classList.remove('mode-section-cut');
      secSectionBtn.classList.remove('active-mode');
      hideModeUI();
      if (sectionLineEl) { sectionLineEl.remove(); sectionLineEl = null; }
      if (directionArrowEl) { directionArrowEl.remove(); directionArrowEl = null; }
      sectionStart = null;
      sectionEnd = null;
    }

    function handleSectionClick(e) {
      if (sectionMode !== 'drawing') return;
      e.stopPropagation();
      e.stopImmediatePropagation();

      const rect = sectionTargetFrame.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      if (!sectionStart) {
        sectionStart = { x, y };
        updateModeText('Click a second point to define the cut angle');
        const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        dot.setAttribute('cx', x); dot.setAttribute('cy', y); dot.setAttribute('r', '4');
        dot.setAttribute('fill', '#6ba5f5');
        sectionLineEl.appendChild(dot);
      } else {
        sectionEnd = { x, y };
        sectionLineEl.innerHTML = '';
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', sectionStart.x); line.setAttribute('y1', sectionStart.y);
        line.setAttribute('x2', sectionEnd.x); line.setAttribute('y2', sectionEnd.y);
        sectionLineEl.appendChild(line);
        [sectionStart, sectionEnd].forEach(p => {
          const d = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          d.setAttribute('cx', p.x); d.setAttribute('cy', p.y); d.setAttribute('r', '4');
          d.setAttribute('fill', '#6ba5f5');
          sectionLineEl.appendChild(d);
        });
        document.body.classList.remove('mode-section-cut');
        sectionMode = 'choosing';
        updateModeText('Click the arrow to confirm direction, or click the other side to flip');
        showDirectionArrow();
      }
    }

    function handleSectionMousemove(e) {
      if (sectionMode !== 'drawing' || !sectionStart) return;
      const rect = sectionTargetFrame.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const old = sectionLineEl.querySelector('.section-cut-preview');
      if (old) old.remove();
      const preview = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      preview.classList.add('section-cut-preview');
      preview.setAttribute('x1', sectionStart.x); preview.setAttribute('y1', sectionStart.y);
      preview.setAttribute('x2', x); preview.setAttribute('y2', y);
      sectionLineEl.appendChild(preview);
    }

    canvasFrame.addEventListener('click', handleSectionClick);
    canvasFrame.addEventListener('mousemove', handleSectionMousemove);
    towerFrame.addEventListener('click', handleSectionClick);
    towerFrame.addEventListener('mousemove', handleSectionMousemove);

    let directionArrowEl = null;
    let currentDirection = 'A';

    function showDirectionArrow() {
      if (directionArrowEl) directionArrowEl.remove();

      const dx = sectionEnd.x - sectionStart.x;
      const dy = sectionEnd.y - sectionStart.y;
      const midX = (sectionStart.x + sectionEnd.x) / 2;
      const midY = (sectionStart.y + sectionEnd.y) / 2;
      const len = Math.sqrt(dx * dx + dy * dy);
      if (len === 0) return;

      // Perpendicular unit vector
      const px = -dy / len;
      const py = dx / len;

      directionArrowEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      directionArrowEl.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:auto;cursor:pointer;z-index:57;';

      function renderArrow() {
        directionArrowEl.innerHTML = '';
        const sign = currentDirection === 'A' ? 1 : -1;
        const arrowDist = 25;
        const tipX = midX + px * arrowDist * sign;
        const tipY = midY + py * arrowDist * sign;

        // Triangle arrow head
        const baseLen = 8;
        const nx = dx / len; // line direction unit vector
        const ny = dy / len;
        const b1x = tipX - nx * baseLen;
        const b1y = tipY - ny * baseLen;
        const b2x = tipX + nx * baseLen;
        const b2y = tipY + ny * baseLen;

        // Stem from line center to arrow
        const stemLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        stemLine.setAttribute('x1', midX); stemLine.setAttribute('y1', midY);
        stemLine.setAttribute('x2', tipX - px * 5 * sign); stemLine.setAttribute('y2', tipY - py * 5 * sign);
        stemLine.setAttribute('stroke', '#6ba5f5');
        stemLine.setAttribute('stroke-width', '1.5');
        directionArrowEl.appendChild(stemLine);

        // Arrow triangle
        const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
        arrow.setAttribute('points', `${tipX},${tipY} ${b1x},${b1y} ${b2x},${b2y}`);
        arrow.setAttribute('fill', '#6ba5f5');
        arrow.setAttribute('opacity', '0.9');
        directionArrowEl.appendChild(arrow);

        // Invisible hit area
        const hitArea = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        hitArea.setAttribute('cx', midX);
        hitArea.setAttribute('cy', midY);
        hitArea.setAttribute('r', '35');
        hitArea.setAttribute('fill', 'transparent');
        directionArrowEl.appendChild(hitArea);
      }

      renderArrow();

      directionArrowEl.addEventListener('click', (e) => {
        e.stopPropagation();
        const rect = sectionTargetFrame.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const clickY = e.clientY - rect.top;
        // Which side of the line was clicked?
        const cross = (clickX - sectionStart.x) * dy - (clickY - sectionStart.y) * dx;
        const clickedSide = cross > 0 ? 'A' : 'B';

        if (clickedSide !== currentDirection) {
          // Flip arrow
          currentDirection = clickedSide;
          renderArrow();
        } else {
          // Confirm — generate section
          generateSectionFrame(currentDirection);
          directionArrowEl.remove();
          directionArrowEl = null;
          currentDirection = 'A';
        }
      });

      sectionTargetFrame.appendChild(directionArrowEl);
    }

    function generateSectionFrame(side) {
      sectionCount++;
      const letter = String.fromCharCode(64 + sectionCount);
      const name = `Section ${letter}-${letter}`;

      // Clean up
      if (sectionLineEl) { sectionLineEl.remove(); sectionLineEl = null; }
      secSectionBtn.classList.remove('active-mode');
      hideModeUI();
      sectionMode = 'idle';

      // Permanent cut mark on original frame
      const mark = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      mark.classList.add('section-cut-mark');
      mark.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;';
      const markLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      markLine.setAttribute('x1', sectionStart.x); markLine.setAttribute('y1', sectionStart.y);
      markLine.setAttribute('x2', sectionEnd.x); markLine.setAttribute('y2', sectionEnd.y);
      mark.appendChild(markLine);
      const markLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      markLabel.setAttribute('x', sectionStart.x - 14); markLabel.setAttribute('y', sectionStart.y + 4);
      markLabel.textContent = letter;
      mark.appendChild(markLabel);
      sectionTargetFrame.appendChild(mark);

      // Make the cut mark line selectable
      mark.style.pointerEvents = 'auto';
      mark.style.cursor = 'default';
      mark.addEventListener('click', (e) => {
        e.stopPropagation();
        deselectAll();
        mark.style.opacity = '1';
        mark._selected = true;
        propertiesPanel.classList.add('visible');
        panelContent.innerHTML = renderLineSectionCut(name);
      });

      createGeneratedFrame(name, 'section');
    }

    function createGeneratedFrame(name, type) {
      const srcFrame = sectionTargetFrame || getActiveFrame();
      const baseX = srcFrame.offsetLeft + srcFrame.offsetWidth + 40;
      const baseY = srcFrame.offsetTop;
      const existingCount = generatedFrames.length;
      const yOffset = existingCount * 300;

      const frame = document.createElement('div');
      frame.className = 'generated-frame';
      frame.style.cssText = `left:${baseX}px;top:${baseY + yOffset}px;width:220px;height:260px;`;

      const label = document.createElement('div');
      label.className = 'generated-frame-label';
      label.textContent = name;
      frame.appendChild(label);

      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('viewBox', '0 0 196 236');
      svg.style.cssText = 'position:absolute;inset:12px;width:calc(100% - 24px);height:calc(100% - 24px);';

      const visibleFloors = FLOORS.slice().sort((a, b) => b.id - a.id).slice(0, 8);

      if (type === 'section') {
        const wallL = 30, wallR = 166, buildingTop = 10, buildingBot = 210;
        const floorCount = Math.min(visibleFloors.length, 6);
        const slabH = (buildingBot - buildingTop) / floorCount;

        // Ground hatch
        const gnd = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        gnd.setAttribute('x', '0'); gnd.setAttribute('y', buildingBot);
        gnd.setAttribute('width', '196'); gnd.setAttribute('height', '26');
        gnd.setAttribute('fill', '#e8e8e5');
        svg.appendChild(gnd);
        for (let hx = 0; hx < 196; hx += 8) {
          const hl = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          hl.setAttribute('x1', hx); hl.setAttribute('y1', buildingBot);
          hl.setAttribute('x2', hx + 12); hl.setAttribute('y2', buildingBot + 26);
          hl.setAttribute('stroke', '#ccc'); hl.setAttribute('stroke-width', '0.5');
          svg.appendChild(hl);
        }

        // Floor slabs + windows
        visibleFloors.slice(0, floorCount).forEach((floor, i) => {
          const y = buildingTop + i * slabH;
          const slab = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
          slab.setAttribute('x', wallL - 4); slab.setAttribute('y', y);
          slab.setAttribute('width', wallR - wallL + 8); slab.setAttribute('height', '4');
          slab.setAttribute('fill', '#ccc');
          svg.appendChild(slab);

          const winY = y + slabH * 0.25, winH = slabH * 0.4;
          const winL = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
          winL.setAttribute('x', wallL + 2); winL.setAttribute('y', winY);
          winL.setAttribute('width', '8'); winL.setAttribute('height', winH);
          winL.setAttribute('fill', '#b8d4e8'); winL.setAttribute('rx', '1');
          svg.appendChild(winL);
          const winR = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
          winR.setAttribute('x', wallR - 10); winR.setAttribute('y', winY);
          winR.setAttribute('width', '8'); winR.setAttribute('height', winH);
          winR.setAttribute('fill', '#b8d4e8'); winR.setAttribute('rx', '1');
          svg.appendChild(winR);

          const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          txt.setAttribute('x', wallR + 12); txt.setAttribute('y', y + slabH / 2 + 3);
          txt.setAttribute('fill', '#bbb');
          txt.setAttribute('font-size', '8'); txt.setAttribute('font-family', 'Inter');
          txt.textContent = floor.label;
          svg.appendChild(txt);
          const ht = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          ht.setAttribute('x', '2'); ht.setAttribute('y', y + slabH / 2 + 3);
          ht.setAttribute('fill', '#bbb');
          ht.setAttribute('font-size', '7'); ht.setAttribute('font-family', 'Inter');
          ht.textContent = (FLOOR_HEIGHTS[floor.id] || '2.80') + 'm';
          svg.appendChild(ht);
        });

        // Bottom slab
        const botSlab = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        botSlab.setAttribute('x', wallL - 4); botSlab.setAttribute('y', buildingBot - 2);
        botSlab.setAttribute('width', wallR - wallL + 8); botSlab.setAttribute('height', '4');
        botSlab.setAttribute('fill', '#ccc');
        svg.appendChild(botSlab);

        // Side walls
        [wallL - 4, wallR].forEach(x => {
          const w = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
          w.setAttribute('x', x); w.setAttribute('y', buildingTop);
          w.setAttribute('width', '4'); w.setAttribute('height', buildingBot - buildingTop);
          w.setAttribute('fill', '#2a2a2a');
          svg.appendChild(w);
        });

        // Interior partition
        const midX = (wallL + wallR) / 2;
        for (let i = 0; i < floorCount; i++) {
          const y = buildingTop + i * slabH + 4;
          const part = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          part.setAttribute('x1', midX); part.setAttribute('y1', y);
          part.setAttribute('x2', midX); part.setAttribute('y2', y + slabH - 4);
          part.setAttribute('stroke', '#ddd'); part.setAttribute('stroke-width', '1');
          part.setAttribute('stroke-dasharray', '3,2');
          svg.appendChild(part);
        }

      } else {
        const facadeW = 140, facadeH = 170, oX = 28, oY = 30;
        const floorCount = Math.min(visibleFloors.length, 6);
        const slabH = facadeH / floorCount;
        const groundY = oY + facadeH;

        // Ground line + hatch
        const gndLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        gndLine.setAttribute('x1', '0'); gndLine.setAttribute('y1', groundY);
        gndLine.setAttribute('x2', '196'); gndLine.setAttribute('y2', groundY);
        gndLine.setAttribute('stroke', '#2a2a2a'); gndLine.setAttribute('stroke-width', '2');
        svg.appendChild(gndLine);
        for (let hx = 0; hx < 196; hx += 6) {
          const hl = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          hl.setAttribute('x1', hx); hl.setAttribute('y1', groundY + 2);
          hl.setAttribute('x2', hx + 8); hl.setAttribute('y2', groundY + 14);
          hl.setAttribute('stroke', '#ccc'); hl.setAttribute('stroke-width', '0.5');
          svg.appendChild(hl);
        }

        // Roof
        const roofPoly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
        roofPoly.setAttribute('points', `${oX},${oY} ${oX + facadeW / 2},${oY - 20} ${oX + facadeW},${oY}`);
        roofPoly.setAttribute('stroke', '#2a2a2a'); roofPoly.setAttribute('fill', '#e8e8e5');
        roofPoly.setAttribute('stroke-width', '1.5');
        svg.appendChild(roofPoly);

        // Building outline
        const facade = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        facade.setAttribute('x', oX); facade.setAttribute('y', oY);
        facade.setAttribute('width', facadeW); facade.setAttribute('height', facadeH);
        facade.setAttribute('stroke', '#2a2a2a'); facade.setAttribute('fill', 'none');
        facade.setAttribute('stroke-width', '2');
        svg.appendChild(facade);

        // Window grid per floor
        const winCols = 4, winW = 16, winH = slabH * 0.4;
        const winGap = (facadeW - winCols * winW) / (winCols + 1);
        visibleFloors.slice(0, floorCount).forEach((floor, i) => {
          const floorY = oY + i * slabH;
          if (i > 0) {
            const fl = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            fl.setAttribute('x1', oX); fl.setAttribute('y1', floorY);
            fl.setAttribute('x2', oX + facadeW); fl.setAttribute('y2', floorY);
            fl.setAttribute('stroke', '#ddd'); fl.setAttribute('stroke-width', '0.5');
            svg.appendChild(fl);
          }
          const winY = floorY + slabH * 0.3;
          for (let c = 0; c < winCols; c++) {
            const winX = oX + winGap + c * (winW + winGap);
            const win = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            win.setAttribute('x', winX); win.setAttribute('y', winY);
            win.setAttribute('width', winW); win.setAttribute('height', winH);
            win.setAttribute('fill', '#b8d4e8'); win.setAttribute('stroke', '#999');
            win.setAttribute('stroke-width', '0.5'); win.setAttribute('rx', '1');
            svg.appendChild(win);
            const cx = winX + winW / 2, cy = winY + winH / 2;
            const vl = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            vl.setAttribute('x1', cx); vl.setAttribute('y1', winY);
            vl.setAttribute('x2', cx); vl.setAttribute('y2', winY + winH);
            vl.setAttribute('stroke', '#999'); vl.setAttribute('stroke-width', '0.3');
            svg.appendChild(vl);
            const hl = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            hl.setAttribute('x1', winX); hl.setAttribute('y1', cy);
            hl.setAttribute('x2', winX + winW); hl.setAttribute('y2', cy);
            hl.setAttribute('stroke', '#999'); hl.setAttribute('stroke-width', '0.3');
            svg.appendChild(hl);
          }
          const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          txt.setAttribute('x', '4'); txt.setAttribute('y', floorY + slabH / 2 + 3);
          txt.setAttribute('fill', '#bbb');
          txt.setAttribute('font-size', '7'); txt.setAttribute('font-family', 'Inter');
          txt.textContent = floor.label;
          svg.appendChild(txt);
        });

        // Door on ground floor
        const doorW = 18, doorH = slabH * 0.65;
        const doorX = oX + facadeW / 2 - doorW / 2;
        const doorY = groundY - doorH;
        const door = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        door.setAttribute('x', doorX); door.setAttribute('y', doorY);
        door.setAttribute('width', doorW); door.setAttribute('height', doorH);
        door.setAttribute('fill', '#d4c9a8'); door.setAttribute('stroke', '#999');
        door.setAttribute('stroke-width', '0.5'); door.setAttribute('rx', '1');
        svg.appendChild(door);
      }

      frame.appendChild(svg);

      frame.addEventListener('click', (e) => {
        e.stopPropagation();
        deselectAll();
        frame.classList.add('selected');
        propertiesPanel.classList.add('visible');
        panelContent.innerHTML = renderFrameSection(name)
          + renderExportSection();
        wireExportActions();
      });

      document.querySelector('.canvas').appendChild(frame);
      generatedFrames.push(frame);
      return frame;
    }

    document.getElementById('secSectionCut').addEventListener('click', (e) => {
      e.stopPropagation();
      if (sectionMode !== 'idle') { cancelSectionCut(); return; }
      startSectionCut();
    });

    // ══════════════════════════════════════════════════════════════════
    // ── Elevation Flow ───────────────────────────────────────────────
    // ══════════════════════════════════════════════════════════════════

    let compassEl = null;
    let northAngle = null; // radians, null = not set
    let northPointFrame = null; // which frame element has north set
    let northPointStart = null;
    const elevationCounts = { North: 0, South: 0, East: 0, West: 0 };

    function startNorthPointFlow() {
      northPointStart = null;
      showModeUI('Elevation — Set North', 'Click a point on the floor plan to start');

      let northPreviewLine = null;

      function cleanup() {
        sectionTargetFrame.removeEventListener('click', handleFirstClick, true);
        sectionTargetFrame.removeEventListener('click', handleSecondClick, true);
        sectionTargetFrame.removeEventListener('mousemove', handleMove);
        if (northPreviewLine) { northPreviewLine.remove(); northPreviewLine = null; }
      }

      function handleFirstClick(e) {
        e.stopPropagation();
        const rect = sectionTargetFrame.getBoundingClientRect();
        northPointStart = { x: e.clientX - rect.left, y: e.clientY - rect.top };
        updateModeText('Move mouse to set North direction, click to confirm');

        // Create preview SVG
        northPreviewLine = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        northPreviewLine.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:57;';
        sectionTargetFrame.appendChild(northPreviewLine);

        sectionTargetFrame.removeEventListener('click', handleFirstClick, true);
        sectionTargetFrame.addEventListener('mousemove', handleMove);
        sectionTargetFrame.addEventListener('click', handleSecondClick, true);
      }

      function handleMove(e) {
        if (!northPointStart || !northPreviewLine) return;
        const rect = sectionTargetFrame.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        northPreviewLine.innerHTML = '';

        // Line from start to cursor
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', northPointStart.x); line.setAttribute('y1', northPointStart.y);
        line.setAttribute('x2', x); line.setAttribute('y2', y);
        line.setAttribute('stroke', '#6ba5f5'); line.setAttribute('stroke-width', '1.5');
        line.setAttribute('stroke-dasharray', '4 3');
        northPreviewLine.appendChild(line);

        // "N" label at cursor end
        const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        label.setAttribute('x', x); label.setAttribute('y', y - 10);
        label.setAttribute('text-anchor', 'middle');
        label.setAttribute('fill', '#6ba5f5'); label.setAttribute('font-size', '11');
        label.setAttribute('font-weight', '700'); label.setAttribute('font-family', 'Inter');
        label.textContent = 'N';
        northPreviewLine.appendChild(label);

        // Dot at start
        const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        dot.setAttribute('cx', northPointStart.x); dot.setAttribute('cy', northPointStart.y);
        dot.setAttribute('r', '3'); dot.setAttribute('fill', '#6ba5f5');
        northPreviewLine.appendChild(dot);
      }

      function handleSecondClick(e) {
        e.stopPropagation();
        const rect = sectionTargetFrame.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        // Calculate angle: atan2 with inverted Y (screen coords)
        northAngle = Math.atan2(-(y - northPointStart.y), x - northPointStart.x);
        northPointFrame = sectionTargetFrame;

        cleanup();
        hideModeUI();

        // Show small N indicator on frame
        showNorthIndicator();

        // Now show the rotated compass
        showCompass();
      }

      sectionTargetFrame.addEventListener('click', handleFirstClick, true);

      // Allow Escape to cancel
      function handleEsc(e) {
        if (e.key === 'Escape') {
          cleanup();
          hideModeUI();
          document.removeEventListener('keydown', handleEsc);
        }
      }
      document.addEventListener('keydown', handleEsc);
    }

    function showNorthIndicator() {
      sectionTargetFrame.querySelector('.north-indicator')?.remove();
      const indicator = document.createElement('div');
      indicator.className = 'north-indicator';
      indicator.textContent = 'N';
      indicator.title = 'North direction — click to reset';
      indicator.addEventListener('click', (e) => {
        e.stopPropagation();
        northAngle = null;
        northPointFrame = null;
        indicator.remove();
      });
      indicator.addEventListener('mousedown', (e) => e.stopPropagation());
      sectionTargetFrame.appendChild(indicator);
    }

    function showCompass() {
      if (compassEl) compassEl.remove();
      sectionTargetFrame = getActiveFrame(); // reuse for elevation too
      showModeUI('Elevation', 'Click a direction on the compass');
      const fw = sectionTargetFrame.offsetWidth;
      const fh = sectionTargetFrame.offsetHeight;
      const ringSize = Math.min(120, fw * 0.3, fh * 0.3);
      const cx = fw / 2;
      const cy = fh / 2;

      compassEl = document.createElement('div');
      compassEl.className = 'elevation-compass';
      compassEl.style.cssText = `left:${cx - ringSize / 2}px;top:${cy - ringSize / 2}px;width:${ringSize}px;height:${ringSize}px;`;

      const ring = document.createElement('div');
      ring.className = 'compass-ring';
      ring.style.cssText = 'inset:0;position:absolute;';
      compassEl.appendChild(ring);

      const rotation = northAngle || 0;

      const markers = [
        { dir: 'North', label: 'N', angle: rotation },
        { dir: 'South', label: 'S', angle: rotation + Math.PI },
        { dir: 'East',  label: 'E', angle: rotation - Math.PI / 2 },
        { dir: 'West',  label: 'W', angle: rotation + Math.PI / 2 },
      ];

      markers.forEach(m => {
        const marker = document.createElement('div');
        marker.className = 'compass-marker';
        const mx = 50 + Math.cos(m.angle) * 45;
        const my = 50 - Math.sin(m.angle) * 45;
        marker.style.cssText = `left:${mx}%;top:${my}%;transform:translate(-50%,-50%);position:absolute;`;
        marker.textContent = m.label;
        marker.addEventListener('click', (e) => {
          e.stopPropagation();
          generateElevation(m.dir);
        });
        compassEl.appendChild(marker);
      });

      compassEl.addEventListener('click', (e) => {
        if (e.target === compassEl || e.target === ring) {
          e.stopPropagation();
          hideCompass();
        }
      });

      sectionTargetFrame.appendChild(compassEl);
      requestAnimationFrame(() => compassEl.classList.add('visible'));
    }

    function hideCompass() {
      hideModeUI();
      if (compassEl) {
        compassEl.classList.remove('visible');
        setTimeout(() => { if (compassEl) { compassEl.remove(); compassEl = null; } }, 200);
      }
    }

    function generateElevation(direction) {
      hideCompass();
      elevationCounts[direction]++;
      const suffix = elevationCounts[direction] > 1 ? ` ${elevationCounts[direction]}` : '';
      const name = `Elevation ${direction}${suffix}`;
      createGeneratedFrame(name, 'elevation');
    }

    document.getElementById('secElevation').addEventListener('click', (e) => {
      e.stopPropagation();
      if (compassEl) { hideCompass(); return; }
      sectionTargetFrame = getActiveFrame();
      if (northAngle !== null && northPointFrame === sectionTargetFrame) {
        showCompass();
      } else {
        startNorthPointFlow();
      }
    });

              <div class="prop-section-action-btn" title="Group"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M12.5713 1.14355H13.7141C14.0172 1.14355 14.308 1.26397 14.5223 1.47829C14.7365 1.69262 14.857 1.9833 14.857 2.28641V3.42927M1.14258 3.42927V2.28641C1.14258 1.9833 1.26299 1.69262 1.47731 1.47829C1.69164 1.26397 1.98233 1.14355 2.28544 1.14355H3.42829M6.28564 1.14355H9.71422M14.8569 6.28613V9.7147M1.14258 6.28613V9.7147M12.5713 14.858H13.7141C14.0172 14.858 14.308 14.7375 14.5223 14.5232C14.7365 14.309 14.857 14.0182 14.857 13.7151V12.5723M1.14258 12.5723V13.7151C1.14258 14.0182 1.26299 14.309 1.47731 14.5232C1.69164 14.7375 1.98233 14.858 2.28544 14.858H3.42829M6.28564 14.8574H9.71422" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
              <div class="prop-section-action-btn" title="Copy"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M10.8567 1.14355H9.71387M5.71387 1.14355H6.85672M1.14258 2.85784V2.28641C1.14258 1.65523 1.65426 1.14355 2.28544 1.14355H2.85686M1.14258 5.71484V6.8577M1.14258 10.8577V9.71484M14.8567 13.7153V5.14383C14.8567 4.51266 14.345 4.00098 13.7138 4.00098H5.14237C4.51119 4.00098 3.99951 4.51266 3.99951 5.14383V13.7153C3.99951 14.3465 4.51119 14.8581 5.14237 14.8581H13.7138C14.345 14.8581 14.8567 14.3465 14.8567 13.7153Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            </div>
          </div>
          ${showFormat ? `

                <div style="display:flex;align-items:center;">
                  <div class="prop-format-icon"></div>
                  A3
                </div>
                <span class="chevron"><svg viewBox="0 0 6 4" fill="none"><path d="M0.5 0.5L3 3L5.5 0.5" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/></svg></span>

          </div>
          <div class="prop-row" >
            <div class="prop-size-row">
              <div class="prop-field">
                <div class="prop-field-label">Size (cm)</div>
                <input class="prop-field-input" type="text" value="1536">

                <div class="prop-field-label">&nbsp;</div>
                <input class="prop-field-input" type="text" value="1024">

          ${showGhost ? `<div class="prop-row" >

              <input class="prop-field-input" type="text" value="20" id="propGhostOpacity">

        </div>`;
    }

    function renderExportSection() {

    function addExportPreset() {
      const container = document.getElementById('propExportPresets');
      const hint = document.getElementById('propExportHint');
      const exportBtn = document.getElementById('propExportBtn');
      if (hint) hint.style.display = 'none';
      if (exportBtn) exportBtn.style.display = '';

      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'display:flex;align-items:flex-start;gap:4px;margin-bottom:6px;';

      const card = document.createElement('div');
      card.className = 'prop-export-card';
      card.style.flex = '1';
      card.style.marginBottom = '0';
      card.innerHTML = `
        <div class="prop-export-row" style="margin-bottom:0;">
          <div class="prop-export-dropdown" data-type="scope" data-value="All Floors">All Floors <span class="chevron"><svg viewBox="0 0 6 4" fill="none"><path d="M0.5 0.5L3 3L5.5 0.5" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/></svg></span></div>
          <div class="prop-export-dropdown" data-type="format" data-value="PDF">PDF <span class="chevron"><svg viewBox="0 0 6 4" fill="none"><path d="M0.5 0.5L3 3L5.5 0.5" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/></svg></span></div>
        </div>
      `;

      // Wire dropdown clicks
      card.querySelectorAll('.prop-export-dropdown').forEach(dd => {
        dd.addEventListener('click', (e) => {
          e.stopPropagation();
          // Close any open menus first
          document.querySelectorAll('.prop-export-dropdown-menu').forEach(m => m.remove());

          const type = dd.dataset.type;
          const current = dd.dataset.value;
          const options = type === 'scope'
            ? ['Current Floor', 'All Floors']
            : ['PDF', 'PNG', 'JPG'];

          const menu = document.createElement('div');
          menu.className = 'prop-export-dropdown-menu';
          options.forEach(opt => {
            const item = document.createElement('div');
            item.className = 'prop-export-dropdown-item' + (opt === current ? ' active' : '');
            item.textContent = opt;
            item.addEventListener('click', (ev) => {
              ev.stopPropagation();
              dd.dataset.value = opt;
              dd.innerHTML = `${opt} <span class="chevron"><svg viewBox="0 0 6 4" fill="none"><path d="M0.5 0.5L3 3L5.5 0.5" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/></svg></span>`;
              menu.remove();
            });
            menu.appendChild(item);
          });
          dd.appendChild(menu);

          // Close on outside click
          const closeMenu = () => { menu.remove(); document.removeEventListener('click', closeMenu); };
          setTimeout(() => document.addEventListener('click', closeMenu), 0);
        });
      });

      const removeBtn = document.createElement('div');
      removeBtn.className = 'prop-export-remove';
      removeBtn.textContent = '✕';
      removeBtn.style.cssText = 'margin-top:6px;flex-shrink:0;';
      removeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        wrapper.remove();
        const remaining = container.querySelectorAll('.prop-export-card');
        if (remaining.length === 0) {
          if (hint) hint.style.display = '';
          if (exportBtn) exportBtn.style.display = 'none';
        }
      });

      wrapper.appendChild(card);
      wrapper.appendChild(removeBtn);
      container.appendChild(wrapper);
    }

    function wireFloorActions() {
      // Info tooltip uses the shared tooltip system
      const infoIcon = panelContent.querySelector('.prop-info-icon');
      if (infoIcon) {
        let infoTtTimer = null;
        infoIcon.addEventListener('mouseenter', () => {
          infoTtTimer = setTimeout(() => {
            showTooltipAt(infoIcon, '<span class="tt-name" style="white-space:normal;max-width:200px;display:block;">Changing story height affects staircase geometry on this floor</span>');
          }, ttDelay());
        });
        infoIcon.addEventListener('mouseleave', () => {
          clearTimeout(infoTtTimer);
          hideTooltip();
        });
      }

      const dupBtn = document.getElementById('propDuplicateFloor');
      const delBtn = document.getElementById('propDeleteFloor');
      if (dupBtn) {
        dupBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          const current = FLOORS.find(f => f.id === activeFloor);
          if (!current) return;
          const newId = activeFloor + 1;

          // Shift floors above
          FLOORS.forEach(f => { if (f.id >= newId) f.id += 1; });
          FLOORS.forEach(f => {
            if (f.id > activeFloor + 1) {
              const ln = floorLabelForId(f.id);
              f.label = ln.label;
              f.name = ln.name;
            }
          });
          const shiftedIds = Object.keys(FLOOR_HEIGHTS).map(Number).filter(k => k >= newId).sort((a, b) => b - a);
          shiftedIds.forEach(k => { FLOOR_HEIGHTS[k + 1] = FLOOR_HEIGHTS[k]; delete FLOOR_HEIGHTS[k]; });
          FLOOR_HEIGHTS[newId] = FLOOR_HEIGHTS[activeFloor] || '2.80';

          const ln = floorLabelForId(newId);
          FLOORS.push({ id: newId, label: ln.label, name: current.name + ' Copy' });
          FLOORS.sort((a, b) => a.id - b.id);

          buildFloorDom();
          setActiveFloor(newId);
        });
      }
      if (delBtn) {
        delBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (FLOORS.length <= 1) return;
          const deletedId = activeFloor;
          const idx = FLOORS.findIndex(f => f.id === deletedId);
          if (idx === -1) return;

          FLOORS.splice(idx, 1);
          delete FLOOR_HEIGHTS[deletedId];

          // Shift floors above the deleted one down by 1
          FLOORS.forEach(f => { if (f.id > deletedId) f.id -= 1; });
          FLOORS.forEach(f => {
            if (f.id >= deletedId) {
              const ln = floorLabelForId(f.id);
              f.label = ln.label;
              f.name = ln.name;
            }
          });
          const shiftedIds = Object.keys(FLOOR_HEIGHTS).map(Number).filter(k => k > deletedId).sort((a, b) => a - b);
          shiftedIds.forEach(k => { FLOOR_HEIGHTS[k - 1] = FLOOR_HEIGHTS[k]; delete FLOOR_HEIGHTS[k]; });

          FLOORS.sort((a, b) => a.id - b.id);
          buildFloorDom();
          const nearest = FLOORS[Math.min(idx, FLOORS.length - 1)];
          setActiveFloor(nearest.id);
        });
      }
      const ghostInput = document.getElementById('propGhostOpacity');
      if (ghostInput) {
        ghostInput.addEventListener('input', () => {
          const val = parseFloat(ghostInput.value);
          if (isNaN(val)) return;
          if (activeFloor !== 0) {
            frameGhost.style.opacity = (Math.max(0, Math.min(100, val)) / 100).toString();
          }
        });
      }
      const nameInput = document.getElementById('propFloorName');
      if (nameInput) {
        nameInput.addEventListener('change', () => {
          const floor = FLOORS.find(f => f.id === activeFloor);
          if (floor) {
            floor.name = nameInput.value;
            frameName.textContent = floor.name;
            buildFloorDom();
          }
        });
      }
    }

    function wireExportActions() {
      const addBtn = document.getElementById('propAddExport');
      if (addBtn) {
        addBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          addExportPreset();
        });
      }
    }

    // ══════════════════════════════════════════════════════════════════════════
    // ── Infinite Canvas: Pan + Zoom ──────────────────────────────────────────
    // ══════════════════════════════════════════════════════════════════════════

    const canvasEl = document.getElementById('canvasEl');
    let panX = 0, panY = 0, zoom = 1;
    let isPanning = false;
    let spaceHeld = false;
    let panStartX, panStartY, panStartPX, panStartPY;

    function applyCanvas() {
      canvasEl.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
      applyCounterZoom();
      updateOverlayPositions();
    }

    function applyCounterZoom() {
      const s = 1 / zoom;
      const counterScale = `scale(${s})`;

      // Frame headers (titles above frames)
      document.querySelectorAll('.frame-header').forEach(el => {
        el.style.transform = counterScale;
        el.style.transformOrigin = 'bottom left';
      });

      // Convert button
      if (frameConvertBtn) {
        frameConvertBtn.style.transform = counterScale;
        frameConvertBtn.style.transformOrigin = 'bottom right';
      }

      // Selection handles — counter-scale via border-width
      const handleSize = Math.max(6, 8 * s);
      const borderW = Math.max(1.5, 2 * s);
      document.documentElement.style.setProperty('--handle-size', handleSize + 'px');
      document.documentElement.style.setProperty('--handle-border', borderW + 'px');
      document.documentElement.style.setProperty('--frame-border', Math.max(1, 2 * s) + 'px');

      // Floor nav + page nav are fixed overlays — hide when zoomed out very far
      const pn = document.getElementById('pageNav');
      if (zoom < 0.5) {
        floorNav.style.visibility = 'hidden';
        floorNavGhost.style.visibility = 'hidden';
        if (pn) pn.style.visibility = 'hidden';
      } else {
        floorNav.style.visibility = '';
        floorNavGhost.style.visibility = '';
        if (pn) pn.style.visibility = '';
      }

      // Generated frame labels
      document.querySelectorAll('.generated-frame-label').forEach(el => {
        el.style.transform = counterScale;
        el.style.transformOrigin = 'bottom left';
      });

      // Exploded group labels + frame labels
      document.querySelectorAll('.frame-group-label').forEach(el => {
        el.style.transform = counterScale;
        el.style.transformOrigin = 'bottom left';
      });
      document.querySelectorAll('.frame-group-frame-label').forEach(el => {
        el.style.transform = counterScale;
        el.style.transformOrigin = 'bottom left';
      });

      // Section cut marks labels
      document.querySelectorAll('.section-cut-mark text').forEach(el => {
        const currentX = el.getAttribute('x');
        const currentY = el.getAttribute('y');
        el.setAttribute('font-size', (9 * s).toFixed(1));
      });
    }

    // Space held = grab cursor
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && !e.target.matches('input,textarea')) {
        e.preventDefault();
        spaceHeld = true;
        document.body.classList.add('space-held');
      }
    });
    document.addEventListener('keyup', (e) => {
      if (e.code === 'Space') {
        spaceHeld = false;
        if (!isPanning) document.body.classList.remove('space-held');
      }
    });

    // Pan: Space+drag or middle-mouse
    document.addEventListener('mousedown', (e) => {
      if (e.button === 1 || (e.button === 0 && spaceHeld)) {
        e.preventDefault();
        isPanning = true;
        panStartX = e.clientX;
        panStartY = e.clientY;
        panStartPX = panX;
        panStartPY = panY;
        document.body.classList.add('space-panning');
      }
    });

    document.addEventListener('mousemove', (e) => {
      if (!isPanning) return;
      panX = panStartPX + (e.clientX - panStartX);
      panY = panStartPY + (e.clientY - panStartY);
      applyCanvas();
    });

    document.addEventListener('mouseup', () => {
      if (isPanning) {
        isPanning = false;
        document.body.classList.remove('space-panning');
        if (!spaceHeld) document.body.classList.remove('space-held');
      }
    });

    // Scroll: two-finger trackpad or wheel for pan, pinch or Ctrl+wheel for zoom
    document.addEventListener('wheel', (e) => {
      e.preventDefault();

      if (e.ctrlKey || e.metaKey) {
        // Zoom (pinch-to-zoom or Ctrl+scroll)
        const oldZoom = zoom;
        const delta = -e.deltaY * 0.005;
        zoom = Math.min(3, Math.max(0.15, zoom + delta * zoom));

        // Zoom toward cursor position
        const rect = canvasEl.getBoundingClientRect();
        const cx = e.clientX - rect.left;
        const cy = e.clientY - rect.top;
        const scale = zoom / oldZoom;
        panX = e.clientX - (e.clientX - panX) * scale;
        panY = e.clientY - (e.clientY - panY) * scale;
      } else {
        // Pan (trackpad two-finger or scroll wheel)
        panX -= e.deltaX;
        panY -= e.deltaY;
      }

      applyCanvas();
    }, { passive: false });

  </script>
</body>
