  <title>Odin Toolbar Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ═══ Design Tokens (glass-dark-neutral + draft-dark accent) ═══ */
    :root {
      /* Content */
      --content--primary: #f8fafc;
      --content--secondary: rgba(255, 255, 255, 0.54);
      --content--muted: #717375;
      --content--disabled: #505254;
      --content--inverted: #080a0c;

      /* Surfaces — glass-dark-neutral */
      --surface--base: rgba(21, 23, 25, 0.95);
      --surface--subtle: rgba(21, 23, 25, 0.8);
      --surface--raised: #242628;
      --surface--elevated: #3e4042;
      --surface--inset: #080a0c;

      /* Surface Controls */
      --surface--controls--input-default: rgba(255, 255, 255, 0.05);
      --surface--controls--input-inset: rgba(0, 0, 0, 0.5);
      --surface--controls--button-default: rgba(255, 255, 255, 0.12);
      --surface--controls--button-muted: rgba(255, 255, 255, 0.11);
      --surface--controls--button-hover: rgba(255, 255, 255, 0.2);
      --surface--controls--button-selected: rgba(255, 255, 255, 0.18);
      --surface--controls--toggle-knob: rgba(255, 255, 255, 0.85);

      /* Borders */
      --border--subtle: rgba(255, 255, 255, 0.07);
      --border--default: rgba(255, 255, 255, 0.1);
      --border--strong: rgba(255, 255, 255, 0.2);
      --border--focus: #6ba5f5;
      --border--divider: rgba(255, 255, 255, 0.1);
      --border--muted: rgba(255, 255, 255, 0.03);
      --border--switch-button: rgba(0, 0, 0, 0.8);

      /* Accent — Draft Dark */
      --accent--solid: #1573e5;
      --accent--solid-hover: #1060c0;
      --accent--solid-foreground: #f8fafc;
      --accent--subtle: #052143;
      --accent--subtle-foreground: #6ba5f5;
      --accent--text: #6ba5f5;
      --accent--border: #083469;
      --accent--icon-tint: rgba(16, 96, 192, 0.1);

      /* Accent — Canvas */
      --accent--canvas--guide: rgba(107, 165, 245, 0.27);
      --accent--canvas--guide-fill: rgba(5, 33, 67, 0.35);
      --accent--canvas--crosshair: #6ba5f5;
      --accent--canvas--badge: rgba(5, 33, 67, 0.85);
      --accent--canvas--badge-text: #6ba5f5;
      --accent--canvas--dot: #6ba5f5;

      /* Accent — Polish Dark */
      --accent-polish--solid: #e56a12;
      --accent-polish--solid-hover: #ff9e63;
      --accent-polish--text: #ff9e63;

      /* Status */
      --status--danger--solid: #e11919;
      --status--danger--text: #f36d6d;
      --status--danger--subtle: #120505;

      /* Radius */
      --radius--element: 2px;
      --radius--control: 4px;
      --radius--component: 6px;
      --radius--container: 8px;
      --radius--pill: 100px;

      /* Shadows */
      --shadow--toolbar: 0px 6px 2px 0px rgba(0,0,0,0), 0px 4px 2px 0px rgba(0,0,0,0.01), 0px 2px 1px 0px rgba(0,0,0,0.03), 0px 1px 1px 0px rgba(0,0,0,0.05), 0px 0px 1px 0px rgba(0,0,0,0.06);
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #151719;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
    body.space-panning { cursor: grabbing; }
    body.space-held { cursor: grab; }

    .canvas {
      position: absolute;
      left: 0;
      top: 0;
      width: 4000px;
      height: 3000px;
      background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 20px 20px;
      transform-origin: 0 0;
      will-change: transform;
    }

    /* Toolbar anchored bottom-center.
       Total width stays constant: search + tools = constant
       (search grows by exactly what tools shrinks) */
    .toolbar-container {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0;
      align-items: flex-end;
      padding: 8px;
      z-index: 100;
    }

    /* ─── Shared pill ─── */
    .pill {
      background: var(--surface--subtle);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border--default);
      border-radius: var(--radius--container);
      box-shadow: var(--shadow--toolbar);
    }

    /* ─── Search / Command pill ───
       Starts at 52×52 (just the icon). Expands to toolsWidth when open.
       Input is always inside but hidden via opacity. */
    .search-pill {
      height: 48px;
      width: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      gap: 0;
      overflow: hidden;
      flex-shrink: 0;
      margin-right: 8px;
      cursor: pointer;
      position: relative;
      transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .search-pill:hover {
      background: var(--surface--controls--button-hover);
    }

    .search-pill.open {
      cursor: text;
      justify-content: flex-start;
      padding: 8px 8px 8px 16px;
      gap: 8px;
    }

    /* Closing state: keep icon at flex-start position while width shrinks,
       but immediately collapse the input so it doesn't affect layout */
    .search-pill.closing {
      justify-content: flex-start;
      padding: 8px 8px 8px 16px;
      gap: 0;
      cursor: pointer;
    }

    .search-pill.closing input {
      flex: none;
      width: 0;
      opacity: 0;
      pointer-events: none;
      transition: none;
    }

    .search-pill > svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .search-pill input {
      background: none;
      border: none;
      outline: none;
      color: #F8FAFC;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 12px;
      flex: none;
      width: 0;
      min-width: 0;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease 0.12s;
    }

    .search-pill.open input {
      flex: 1;
      width: auto;
      overflow: visible;
      opacity: 1;
      pointer-events: auto;
      align-self: stretch;   /* fill full pill height for bigger click target */
    }
    .search-pill.open > svg { pointer-events: none; }  /* clicks on icon fall through to pill */

    /* ─── Command palette (above the search-pill) ─── */
    .command-dropdown {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 0;
      right: 0;
      background: var(--surface--base);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border--default);
      border-radius: var(--radius--container);
      padding: 4px;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity 0.25s cubic-bezier(0.2, 0, 0, 1), transform 0.3s cubic-bezier(0.2, 0, 0, 1);
      max-height: 420px;
      overflow: hidden;
      box-shadow: 0px 65px 18px rgba(0,0,0,0), 0px 42px 17px rgba(0,0,0,0.02),
                  0px 23px 14px rgba(0,0,0,0.07), 0px 10px 10px rgba(0,0,0,0.12),
                  0px 3px 6px rgba(0,0,0,0.14);
    }

    .command-dropdown.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .command-section {
      padding: 4px 8px 4px 8px;
      font-size: 10px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.35);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }
    .command-section:first-child { margin-top: 0; }

    .command-item {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 32px;
      padding: 4px 8px;
      border-radius: var(--radius--control);
      cursor: pointer;
      transition: background 0.1s ease;
    }

    .command-item:hover                { background: var(--surface--controls--button-hover); }
    .command-item.cmd-draft:hover      { background: var(--accent--solid); }
    .command-item.cmd-polish:hover     { background: var(--accent-polish--solid); }

    .command-item .command-icon {
      width: 24px; height: 24px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.06);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .command-item .command-icon svg { width: 16px; height: 16px; }

    .command-item .command-text {
      flex: 1;
      font-size: 11px; font-weight: 500; color: var(--content--primary);
      white-space: nowrap;
    }

    .command-item .command-shortcut {
      font-size: 10px; color: var(--content--secondary); font-weight: 500;
    }

    /* Active tool indicator in palette */
    .tool-active-dot {
      display: flex; align-items: center; justify-content: center;
      width: 16px; height: 16px;
      flex-shrink: 0;
    }
    .tool-palette-active .command-text {
      color: #F8FAFC;
    }
    .tool-palette-active .command-icon svg path,
    .tool-palette-active .command-icon svg rect,
    .tool-palette-active .command-icon svg circle,
    .tool-palette-active .command-icon svg line {
      stroke: #F8FAFC;
    }

    /* ─── Mode tinting (draft = blue, polish = orange) ─── */
    .cmd-draft .command-icon {
      background: var(--accent--subtle);
    }
    .cmd-draft .command-icon svg path,
    .cmd-draft .command-icon svg rect,
    .cmd-draft .command-icon svg circle,
    .cmd-draft .command-icon svg line {
      stroke: var(--accent--text);
    }

    .cmd-polish .command-icon {
      background: rgba(229, 106, 18, 0.1);
    }
    .cmd-polish .command-icon svg path,
    .cmd-polish .command-icon svg rect,
    .cmd-polish .command-icon svg circle,
    .cmd-polish .command-icon svg line {
      stroke: var(--accent-polish--text);
    }

    /* On hover — clear icon tint bg and set icon to white */
    .command-item:hover .command-icon {
      background: transparent;
    }
    .command-item:hover .command-icon svg path,
    .command-item:hover .command-icon svg rect,
    .command-item:hover .command-icon svg circle,
    .command-item:hover .command-icon svg line {
      stroke: #F8FAFC;
    }
    /* Polish hover: dark text for contrast on amber background */
    .command-item.cmd-polish:hover .command-text { color: #1A1A1A; }
    .command-item.cmd-polish:hover .command-shortcut { color: rgba(0, 0, 0, 0.5); }
    .command-item.cmd-polish:hover .command-icon svg path,
    .command-item.cmd-polish:hover .command-icon svg rect,
    .command-item.cmd-polish:hover .command-icon svg circle,
    .command-item.cmd-polish:hover .command-icon svg line {
      stroke: #1A1A1A;
    }

    /* ─── Keyboard selection — mirrors hover states exactly ─── */
    .command-item.palette-selected                { background: var(--surface--controls--button-hover); }
    .command-item.cmd-draft.palette-selected      { background: var(--accent--solid); }
    .command-item.cmd-polish.palette-selected     { background: var(--accent-polish--solid); }
    .command-item.palette-selected .command-icon  { background: transparent; }
    .command-item.palette-selected .command-icon svg path,
    .command-item.palette-selected .command-icon svg rect,
    .command-item.palette-selected .command-icon svg circle,
    .command-item.palette-selected .command-icon svg line { stroke: #F8FAFC; }
    .command-item.cmd-polish.palette-selected .command-text    { color: #1A1A1A; }
    .command-item.cmd-polish.palette-selected .command-shortcut { color: rgba(0, 0, 0, 0.5); }
    .command-item.cmd-polish.palette-selected .command-icon svg path,
    .command-item.cmd-polish.palette-selected .command-icon svg rect,
    .command-item.cmd-polish.palette-selected .command-icon svg circle,
    .command-item.cmd-polish.palette-selected .command-icon svg line { stroke: #1A1A1A; }

    .asset-item.palette-selected                { background: rgba(52, 211, 153, 0.15); }
    .asset-item.palette-selected .asset-thumb   { background: transparent; }
    .asset-item.palette-selected .asset-thumb svg path,
    .asset-item.palette-selected .asset-thumb svg rect,
    .asset-item.palette-selected .asset-thumb svg circle,
    .asset-item.palette-selected .asset-thumb svg line { stroke: #F8FAFC; }

    /* ─── Quick action item ─── */
    .quick-action-item {
      background: var(--accent--subtle);
      border: 1px solid var(--accent--border);
    }
    .quick-action-item:hover,
    .quick-action-item.palette-selected {
      background: var(--accent--border);
      border-color: var(--accent--text);
    }
    .quick-action-item .command-icon {
      background: var(--accent--subtle);
    }
    .quick-action-item .command-icon svg path,
    .quick-action-item .command-icon svg rect,
    .quick-action-item .command-icon svg circle,
    .quick-action-item .command-icon svg line { stroke: var(--accent--text); }
    .qa-badge {
      font-size: 9px; font-weight: 500;
      color: var(--accent--text);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ─── No-results hint ─── */
    .palette-hint {
      padding: 16px 12px;
      text-align: center;
      font-size: 12px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.35);
      line-height: 1.6;
    }
    .palette-hint kbd {
      display: inline-block;
      padding: 1px 5px;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      vertical-align: 1px;
    }

    .palette-content {
      max-height: 320px;
      overflow-y: auto;
    }

    /* ─── Streaming cursor (reused by AI panel) ─── */
    .odin-cursor {
      display: inline-block;
      width: 1.5px;
      height: 11px;
      background: rgba(255, 255, 255, 0.4);
      margin-left: 1px;
      vertical-align: middle;
      border-radius: 1px;
      animation: cursor-blink 0.65s ease infinite;
    }
    @keyframes cursor-blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ─── Inline tool badges inside AI responses ─── */
    .tool-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 1px 6px 1px 4px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      color: #F8FAFC;
      vertical-align: middle;
      line-height: 18px;
      transition: background 0.12s ease, border-color 0.12s ease;
      user-select: none;
      white-space: nowrap;
    }
    .tool-badge:hover {
      background: var(--accent--subtle);
      border-color: var(--accent--border);
    }
    .tool-badge svg {
      width: 11px;
      height: 11px;
      flex-shrink: 0;
    }
    .tool-badge svg path,
    .tool-badge svg rect,
    .tool-badge svg circle,
    .tool-badge svg line {
      stroke: rgba(255, 255, 255, 0.55);
    }
    .tool-badge:hover svg path,
    .tool-badge:hover svg rect,
    .tool-badge:hover svg circle,
    .tool-badge:hover svg line {
      stroke: var(--accent--text);
    }

    /* ─── AI Overlay Panel ─── */
    @keyframes ai-panel-in {
      from { opacity: 0; transform: translateY(-8px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .odin-ai-panel {
      position: fixed;
      top: 24px;
      right: 24px;
      width: 340px;
      min-width: 280px;
      min-height: 200px;
      max-width: 90vw;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      background: var(--surface--base);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border--default);
      border-radius: var(--radius--container);
      box-shadow:
        0 2px 8px rgba(0,0,0,0.40),
        0 8px 32px rgba(0,0,0,0.32),
        0 0 0 0.5px rgba(255,255,255,0.04) inset;
      z-index: 200;
      overflow: hidden;
      animation: ai-panel-in 0.22s cubic-bezier(0.2, 0, 0, 1) both;
      resize: both;
    }
    .odin-ai-panel.minimized {
      min-height: auto;
      max-height: none;
      height: auto !important;
      resize: none;
    }
    .odin-ai-panel.minimized .odin-ai-messages,
    .odin-ai-panel.minimized .odin-ai-input-area { display: none; }

    .odin-ai-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 10px 10px 12px;
      cursor: grab;
      border-bottom: 1px solid var(--border--subtle);
      user-select: none;
      flex-shrink: 0;
    }
    .odin-ai-header:active { cursor: grabbing; }
    .odin-ai-header svg { width: 14px; height: 14px; flex-shrink: 0; }
    .odin-ai-header-label {
      flex: 1;
      font-size: 11px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 0.2px;
    }
    .odin-ai-header-btn {
      width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius--control);
      cursor: pointer;
      color: var(--content--disabled);
      font-size: 13px; line-height: 1;
      transition: background 0.12s ease, color 0.12s ease;
      flex-shrink: 0;
    }
    .odin-ai-header-btn:hover {
      background: var(--surface--controls--button-hover);
      color: var(--content--primary);
    }

    .odin-ai-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 80px;
    }
    .odin-ai-messages::-webkit-scrollbar { width: 3px; }
    .odin-ai-messages::-webkit-scrollbar-track { background: transparent; }
    .odin-ai-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

    .odin-ai-msg.user {
      align-self: flex-end;
      max-width: 85%;
      padding: 6px 10px;
      background: rgba(0, 153, 255, 0.12);
      border: 1px solid rgba(0, 153, 255, 0.20);
      border-radius: 10px 10px 2px 10px;
      font-size: 12px; font-weight: 400; color: #F8FAFC; line-height: 1.5;
    }
    .odin-ai-msg.assistant {
      align-self: flex-start;
      max-width: 95%;
      font-size: 12px; font-weight: 400;
      color: rgba(255, 255, 255, 0.65);
      line-height: 1.7;
    }
    .odin-ai-msg.assistant p { margin: 0 0 6px; }
    .odin-ai-msg.assistant p:last-child { margin-bottom: 0; }
    .odin-ai-msg.assistant strong { color: #F8FAFC; font-weight: 500; }
    .odin-ai-msg.assistant ol { margin: 3px 0 7px 18px; list-style: decimal; }
    .odin-ai-msg.assistant ul { margin: 3px 0 7px 18px; list-style: disc; }
    .odin-ai-msg.assistant li { color: rgba(255,255,255,0.65); margin-bottom: 3px; padding-left: 2px; }
    .odin-ai-msg.assistant li:last-child { margin-bottom: 0; }

    .odin-ai-input-area {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-top: 1px solid var(--border--subtle);
      flex-shrink: 0;
    }
    .odin-ai-input-area input {
      flex: 1;
      background: var(--surface--controls--input-default);
      border: 0.5px solid var(--border--default);
      border-radius: var(--radius--control);
      padding: 6px 10px;
      font-family: 'Inter', sans-serif;
      font-size: 11px; font-weight: 500; color: var(--content--primary);
      outline: none;
      transition: border-color 0.12s ease, box-shadow 0.12s;
    }
    .odin-ai-input-area input:hover { border-color: var(--border--strong); }
    .odin-ai-input-area input:focus { border-color: var(--border--focus); box-shadow: inset 0 0 0 0.5px var(--border--focus); }
    .odin-ai-input-area input::placeholder { color: var(--content--muted); }
    .odin-ai-send-btn {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius--control); cursor: pointer;
      background: var(--accent--subtle);
      border: 1px solid var(--accent--border);
      color: var(--accent--text);
      transition: background 0.12s ease, color 0.12s ease;
      flex-shrink: 0;
    }
    .odin-ai-send-btn:hover {
      background: var(--accent--border);
      color: var(--accent--subtle-foreground);
    }
    .odin-ai-send-btn svg { width: 14px; height: 14px; }

    /* ─── Asset items ─── */
    .asset-item {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 32px;
      padding: 4px 8px;
      border-radius: var(--radius--control);
      cursor: pointer;
      transition: background 0.1s ease;
    }
    .asset-item:hover { background: rgba(52, 211, 153, 0.15); }
    .asset-item:hover .asset-thumb { background: transparent; }
    .asset-item:hover .asset-thumb svg path,
    .asset-item:hover .asset-thumb svg rect,
    .asset-item:hover .asset-thumb svg circle,
    .asset-item:hover .asset-thumb svg line {
      stroke: #F8FAFC;
    }
    .asset-item:hover .asset-name { color: #F8FAFC; }
    .asset-item .asset-thumb {
      width: 24px; height: 24px;
      border-radius: 4px;
      background: rgba(52, 211, 153, 0.10);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .asset-item .asset-thumb svg { width: 16px; height: 16px; }
    .asset-item .asset-thumb svg path,
    .asset-item .asset-thumb svg rect,
    .asset-item .asset-thumb svg circle,
    .asset-item .asset-thumb svg line {
      stroke: #34D399;
    }
    .asset-item .asset-info { flex: 1; min-width: 0; }
    .asset-item .asset-name {
      font-size: 12px; font-weight: 500; color: #F8FAFC;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .asset-item .asset-tag {
      font-size: 9px; font-weight: 500; color: rgba(52, 211, 153, 0.6);
      text-transform: uppercase; letter-spacing: 0.3px;
    }

    /* ─── Tools pill ───
       Shrinks from full width → 52px. overflow:hidden clips content.
       The active tool stays visible via translateX on the inner wrapper. */
    .tools-pill {
      height: 48px;
      flex-shrink: 0;
      margin-right: 8px;
      overflow: hidden;
      transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Inner wrapper: holds all tools, gets translated to keep active tool visible */
    .tools-inner {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px;
      height: 100%;
      white-space: nowrap;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ─── Tool buttons ─── */
    .tool-btn {
      display: flex;
      align-items: center;
      gap: 1px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .tool-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px; height: 36px;
      border-radius: var(--radius--control);
      overflow: hidden;
      transition: background 0.12s ease;
    }

    .tool-icon:hover { background: var(--surface--controls--button-hover); }

    .tool-icon.active {
      background: var(--accent--solid);
      border: 1px solid var(--border--default);
      border-radius: var(--radius--control);
    }

    .tool-icon.active:hover { background: var(--accent--solid-hover); }

    /* ─── Toolbar tooltip ─── */
    .toolbar-tooltip {
      position: fixed;
      z-index: 300;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      background: var(--surface--base);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border--default);
      border-radius: var(--radius--component);
      pointer-events: none;
      white-space: nowrap;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.12s ease, transform 0.12s ease;
      box-shadow: 0px 4px 12px rgba(0,0,0,0.3);
    }
    .toolbar-tooltip.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .toolbar-tooltip .tt-name {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: var(--content--primary);
    }
    .toolbar-tooltip .tt-shortcut {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      color: var(--content--secondary);
      background: var(--surface--controls--button-default);
      border-radius: var(--radius--element);
      padding: 1px 4px;
    }

    .tool-icon svg { width: 16px; height: 16px; }

    .tool-chevron {
      display: flex; align-items: center;
      height: 36px;
      padding: 0 4px;
      border-radius: var(--radius--control);
      cursor: pointer;
      transition: background 0.12s ease;
    }
    .tool-chevron:hover  { background: var(--surface--controls--button-hover); }
    .tool-chevron.active { background: var(--surface--controls--button-selected); }
    .tool-chevron svg { width: 6px; height: 3.5px; }

    /* ─── Tool Submenu popup ─── */
    .tool-submenu {
      position: fixed;
      display: none;
      flex-direction: column;
      background: var(--surface--subtle);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border--default);
      border-radius: var(--radius--container);
      padding: 4px;
      box-shadow: var(--shadow--toolbar);
      z-index: 200;
      min-width: 156px;
      transform-origin: bottom center;
    }
    .tool-submenu.visible {
      display: flex;
      animation: submenu-in 0.15s cubic-bezier(0.2, 0, 0, 1);
    }
    @keyframes submenu-in {
      from { opacity: 0; transform: translateY(6px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)  scale(1); }
    }

    .submenu-item {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 32px;
      padding: 4px 8px;
      border-radius: var(--radius--control);
      cursor: pointer;
      transition: background 0.1s ease;
      box-sizing: border-box;
    }
    .submenu-item:hover { background: var(--accent--solid); }
    .submenu-item.active { /* checkmark only, no background */ }
    .submenu-check {
      width: 12px; height: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .submenu-icon {
      width: 16px; height: 16px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .submenu-label {
      flex: 1;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 11px;
      color: var(--content--primary);
      white-space: nowrap;
    }
    .submenu-shortcut {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 10px;
      color: var(--content--secondary);
    }

    .toolbar-separator {
      width: 1px; height: 32px;
      background: var(--border--divider);
      border-radius: var(--radius--pill);
      flex-shrink: 0;
    }

    /* ─── Mode pill ─── */
    .mode-pill {
      display: flex; align-items: center; justify-content: center;
      gap: 2px; padding: 6px;
      overflow: hidden; position: relative;
      flex-shrink: 0;
    }

    .mode-glow {
      position: absolute;
      width: 16px; height: 16px;
      filter: blur(7.5px);
      pointer-events: none;
      transition: all 0.3s ease;
    }

    .mode-btn {
      display: flex; align-items: center; justify-content: center;
      padding: 10px;
      border-radius: var(--radius--control);
      cursor: pointer;
      position: relative; z-index: 1;
      transition: all 0.2s ease;
    }
    .mode-btn.active {
      background: var(--surface--controls--button-default);
      box-shadow: 0px 0px 5px 0px rgba(0, 0, 0, 0.7);
    }
    .mode-btn:hover:not(.active) { background: var(--surface--controls--button-hover); }
    .mode-btn svg { width: 16px; height: 16px; }

    /* ─── Polyline canvas ─── */
    body.tool-connect { cursor: crosshair; }
    body.tool-connect .toolbar-container,
    body.tool-connect #toolbarTooltip,
    body.tool-connect #toolSubmenu,
    body.tool-connect .canvas-frame,
    body.tool-connect .canvas-frame *,
    body.tool-connect .floor-selector-bar,
    body.tool-connect .floor-selector-bar *,
    body.tool-connect .secondary-toolbar,
    body.tool-connect .secondary-toolbar *,
    body.tool-connect .properties-panel,
    body.tool-connect .properties-panel * { cursor: default; }
    /* Frame + floor nav must receive clicks even when polyline SVG has pointer-events:all */
    .canvas-frame { pointer-events: auto; }
    .floor-selector-bar.visible, .floor-selector-bar.visible * { pointer-events: auto; }

    #polylineSVG {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 50;
      pointer-events: none;
    }
    body.tool-connect #polylineSVG { pointer-events: all; }

    /* ─── Polyline context toolbar ─── */
    .polyline-ctx-bar {
      position: fixed;
      bottom: 92px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 6px;
      gap: 1px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s cubic-bezier(0.2,0,0,1),
                  transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 99;
      white-space: nowrap;
    }
    .polyline-ctx-bar.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    /* Separator */
    .ctx-sep {
      width: 1px; height: 24px;
      background: rgba(255,255,255,0.08);
      border-radius: 1px;
      flex-shrink: 0;
      margin: 0 5px;
    }

    /* Segment toggle */
    .ctx-seg-group {
      display: flex; align-items: center; gap: 1px;
      background: var(--surface--controls--input-inset);
      border-radius: var(--radius--control); padding: 3px;
    }
    .ctx-seg-btn {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius--control); cursor: pointer;
      color: var(--content--muted);
      transition: background 0.12s, color 0.12s;
    }
    .ctx-seg-btn:hover  { background: var(--surface--controls--button-hover); color: var(--content--primary); }
    .ctx-seg-btn.active { background: var(--surface--controls--button-muted); color: var(--content--primary); }
    .ctx-seg-btn svg { width: 14px; height: 14px; }

    /* Weight control */
    .ctx-weight-wrap {
      display: flex; align-items: center; gap: 1px;
    }
    .ctx-weight-btn {
      width: 22px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius--control); cursor: pointer;
      font-size: 16px; font-weight: 300; line-height: 1;
      color: var(--content--muted);
      transition: background 0.12s, color 0.12s;
      user-select: none;
    }
    .ctx-weight-btn:hover { background: var(--surface--controls--button-hover); color: var(--content--primary); }
    .ctx-weight-label {
      font-family: 'Inter', sans-serif;
      font-size: 11px; font-weight: 500;
      color: rgba(255,255,255,0.65);
      min-width: 22px; text-align: center;
      pointer-events: none;
    }

    /* Color swatches */
    .ctx-swatches {
      display: flex; align-items: center;
      gap: 6px; padding: 0 4px;
    }
    .ctx-swatch {
      width: 12px; height: 12px; border-radius: 50%;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: transform 0.12s, border-color 0.12s;
      flex-shrink: 0;
    }
    .ctx-swatch:hover  { transform: scale(1.25); }
    .ctx-swatch.active { border-color: rgba(255,255,255,0.65); transform: scale(1.15); }

    /* Icon buttons */
    .ctx-btn {
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius--control); cursor: pointer;
      color: var(--content--muted);
      transition: background 0.12s, color 0.12s;
      flex-shrink: 0;
    }
    .ctx-btn:hover  { background: var(--surface--controls--button-hover); color: var(--content--primary); }
    .ctx-btn.active { background: var(--accent--subtle); color: var(--accent--text); }
    .ctx-btn.active:hover { background: var(--accent--border); color: var(--accent--subtle-foreground); }
    .ctx-btn svg { width: 14px; height: 14px; }
    .ctx-btn.ctx-danger { color: rgba(255,80,80,0.5); }
    .ctx-btn.ctx-danger:hover { background: rgba(255,80,80,0.10); color: #FF5050; }

    /* ─── Canvas Frame ─── */
    .canvas-frame {
      position: absolute;
      top: 140px;
      left: 280px;
      width: 620px;
      height: 420px;
      border: var(--frame-border, 2px) solid transparent;
      border-radius: 0;
      cursor: default;
      transition: border-color 0.15s;
      z-index: 55;
      background: #f5f5f3;
    }
    /* Extend hover zone above frame to cover header + convert button */
    .canvas-frame .frame-hover-zone {
      position: absolute;
      top: -36px;
      left: -6px;
      right: -6px;
      height: 42px;
    }
    /* Hover: blue border + blue title, no handles */
    .canvas-frame:hover,
    .canvas-frame.nav-hover {
      border-color: var(--accent--canvas--crosshair);
    }
    /* Selected: blue border + handles */
    .canvas-frame.selected {
      border-color: var(--accent--canvas--crosshair);
    }

    /* Selection handles — only visible when selected, not on hover */
    .canvas-frame.selected::before,
    .canvas-frame.selected::after,
    .canvas-frame.selected .frame-handle-bl,
    .canvas-frame.selected .frame-handle-br {
      content: '';
      position: absolute;
      width: var(--handle-size, 8px);
      height: var(--handle-size, 8px);
      background: #fff;
      border: var(--handle-border, 2px) solid var(--accent--canvas--crosshair);
      border-radius: 2px;
      z-index: 2;
    }
    .canvas-frame.selected::before { top: calc(-1 * var(--handle-size, 8px) / 2 - 1px); left: calc(-1 * var(--handle-size, 8px) / 2 - 1px); }
    .canvas-frame.selected::after  { top: calc(-1 * var(--handle-size, 8px) / 2 - 1px); right: calc(-1 * var(--handle-size, 8px) / 2 - 1px); }
    .frame-handle-bl, .frame-handle-br {
      display: none;
      position: absolute;
      width: var(--handle-size, 8px); height: var(--handle-size, 8px);
      background: #fff; border: var(--handle-border, 2px) solid var(--accent--canvas--crosshair); border-radius: 2px;
      z-index: 2;
    }
    .canvas-frame.selected .frame-handle-bl { display: block; bottom: calc(-1 * var(--handle-size, 8px) / 2 - 1px); left: calc(-1 * var(--handle-size, 8px) / 2 - 1px); }
    .canvas-frame.selected .frame-handle-br { display: block; bottom: calc(-1 * var(--handle-size, 8px) / 2 - 1px); right: calc(-1 * var(--handle-size, 8px) / 2 - 1px); }

    /* Frame header — label stays fixed, never shifts */
    .frame-header {
      position: absolute;
      top: -22px;
      left: 0;
      font-size: 11px;
      font-weight: 500;
      color: var(--content--muted);
      white-space: nowrap;
      user-select: none;
      line-height: 1;
    }
    .canvas-frame:hover .frame-header,
    .canvas-frame.nav-hover .frame-header { color: var(--accent--canvas--crosshair); }
    .canvas-frame.selected .frame-header { color: var(--accent--canvas--crosshair); }

    /* Convert button — positioned at top-right OUTSIDE the frame */
    .frame-convert-btn {
      position: absolute;
      top: -28px;
      right: 0;
      display: none;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      padding: 0;
      color: var(--content--secondary);
      background: transparent;
      border: none;
      border-radius: var(--radius--control);
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      z-index: 2;
    }
    .frame-convert-btn svg { width: 14px; height: 14px; }
    .frame-convert-btn:hover { background: var(--surface--controls--button-hover); color: var(--content--primary); }
    .canvas-frame:hover .frame-convert-btn,
    .canvas-frame.selected .frame-convert-btn { display: flex; }
    .canvas-frame.multilayer .frame-convert-btn { display: none; }

    /* ─── Floor Selector Bar (fixed overlay, tracks frame position) ─── */
    .floor-selector-bar {
      position: fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      z-index: 85;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
      width: 36px;
      padding: 6px 0;
      background: var(--surface--subtle);
      border: 1px solid var(--border--default);
      border-radius: var(--radius--container);
      box-shadow: var(--shadow--toolbar);
      backdrop-filter: blur(12px);
      overflow: hidden;
    }
    .floor-selector-bar .floor-dots-viewport {
      flex: 1;
      min-height: 0;
    }
    .floor-selector-bar.visible { opacity: 1; pointer-events: auto; cursor: pointer; }
    .floor-selector-bar.visible.active { cursor: default; }
    /* Dimmed state: hide labels, active dot becomes gray, items not interactive */
    .floor-selector-bar.visible:not(.active) .floor-dot-label { opacity: 0 !important; }
    .floor-selector-bar.visible:not(.active) .floor-dot-item.active .floor-dot { background: var(--border--strong) !important; }
    .floor-selector-bar.visible:not(.active) .floor-dot-item { pointer-events: none; }
    .floor-selector-bar.visible:not(.active) .floor-nav-counter { visibility: hidden; }
    .floor-selector-bar.visible:not(.active) .fsb-btn { opacity: 0; pointer-events: none; }
    /* Counter always takes space (visibility not display) to prevent layout shift */

    .floor-dots-viewport {
      overflow: hidden;
      position: relative;
    }
    .floor-dots-track {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .floor-dot-item {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 14px;
      width: 100%;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
    }
    .floor-dot-item::after {
      content: '';
      position: absolute;
      inset: -2px -8px;
    }

    .floor-dot-label {
      font-size: 10px;
      font-weight: 500;
      color: rgba(255,255,255,0);
      transition: color 0.2s, transform 0.2s cubic-bezier(0.4,0,0.2,1);
      transform: translateX(4px);
      white-space: nowrap;
      user-select: none;
      position: absolute;
      right: calc(100% + 6px);
    }
    .floor-dot-item:hover .floor-dot-label { color: var(--content--secondary); transform: translateX(0); }
    .floor-dot-item.active .floor-dot-label { color: var(--accent--canvas--crosshair); transform: translateX(0); }

    .floor-dot {
      width: 6px;
      height: 6px;
      background: var(--border--default);
      border-radius: 50%;
      flex-shrink: 0;
      transition: width 0.3s cubic-bezier(0.25, 1, 0.5, 1),
                  height 0.3s cubic-bezier(0.25, 1, 0.5, 1),
                  background 0.3s,
                  opacity 0.3s;
    }
    .floor-dot-item:hover .floor-dot { width: 7px; height: 7px; background: var(--border--strong); }
    .floor-dot-item.active .floor-dot { width: 8px; height: 8px; background: var(--accent--canvas--crosshair); }

    /* FSB action buttons (+ and Explode) */
    .fsb-btn {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius--control);
      color: var(--content--secondary);
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.12s, color 0.12s, opacity 0.2s;
    }
    .fsb-btn svg { width: 12px; height: 12px; }
    .fsb-btn:hover { background: var(--surface--controls--button-hover); color: var(--content--primary); }

    /* Floor counter — "3 / 25" below nav, clickable → input */
    .floor-nav-counter {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
      font-size: 10px;
      font-weight: 500;
      color: var(--content--secondary);
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      transition: color 0.12s;
      padding: 2px 4px;
      border-radius: var(--radius--control);
    }
    .floor-nav-counter:hover { color: var(--content--primary); background: var(--surface--controls--button-hover); }
    .floor-nav-counter .counter-current { color: var(--content--primary); }
    .floor-nav-counter .counter-sep { margin: 0 2px; color: var(--content--muted); }

    .floor-nav-counter-input {
      width: 40px;
      height: 20px;
      padding: 0 4px;
      background: var(--surface--controls--input-default);
      border: 1px solid var(--border--focus);
      border-radius: var(--radius--control);
      color: var(--content--primary);
      font-size: 10px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      text-align: center;
      outline: none;
    }


    /* ─── PDF Frame ─── */
    .canvas-frame.pdf-frame {
      width: 280px;
      height: 396px;
      top: 620px;
      left: 280px;
    }

    /* ─── Page Navigation (fixed overlay, tracks PDF frame position) ─── */
    .page-nav {
      position: fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      z-index: 85;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
    }
    .page-nav.visible { opacity: 1; pointer-events: auto; }
    .page-nav.visible.active { pointer-events: auto; }
    .page-nav.visible:not(.active) .page-nav-label { opacity: 0; }
    .page-nav.visible:not(.active) .page-nav-dot.active { background: var(--border--strong); }
    .page-nav.visible:not(.active) .page-nav-arrow { opacity: 0; pointer-events: none; }

    .page-nav-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .page-nav-arrow {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius--control);
      cursor: pointer;
      color: var(--content--secondary);
      background: transparent;
      border: none;
      transition: background 0.12s, color 0.12s;
    }
    .page-nav-arrow:hover { background: var(--surface--controls--button-hover); color: var(--content--primary); }
    .page-nav-arrow svg { width: 10px; height: 10px; }

    .page-nav-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border--default);
      transition: background 0.12s;
      flex-shrink: 0;
    }
    .page-nav-dot.active { background: var(--accent--canvas--dot); }

    .page-nav-label {
      font-size: 10px;
      font-weight: 500;
      color: var(--content--secondary);
      font-family: 'Inter', sans-serif;
      text-align: center;
      white-space: nowrap;
      transition: opacity 0.2s;
    }

    /* ─── Exploded Group — real frames side by side with dotted group border ─── */
    .frame-group {
      position: absolute;
      z-index: 55;
      display: flex;
      gap: 24px;
      padding: 20px;
      border: 1.5px dashed var(--border--strong);
      border-radius: var(--radius--control);
      cursor: default;
      transition: border-color 0.15s;
    }
    .frame-group.group-selected {
      border-color: var(--accent--canvas--crosshair);
    }
    .frame-group.group-selected > .frame-group-label {
      color: var(--accent--canvas--crosshair);
    }
    .frame-group-label {
      position: absolute;
      top: -20px;
      left: 0;
      font-size: 11px;
      font-weight: 500;
      color: var(--content--muted);
      font-family: 'Inter', sans-serif;
      white-space: nowrap;
    }
    .frame-group-frame {
      width: 200px;
      height: 280px;
      border: 1px solid rgba(255,255,255,0.08);
      background: #f5f5f3;
      cursor: default;
      position: relative;
      transition: border-color 0.12s;
    }
    .frame-group-frame:hover { border-color: var(--accent--canvas--guide); }
    .frame-group-frame.selected { border-color: var(--accent--canvas--crosshair); }
    .frame-group-frame.selected::before,
    .frame-group-frame.selected::after {
      content: '';
      position: absolute;
      width: var(--handle-size, 8px); height: var(--handle-size, 8px);
      background: #fff; border: var(--handle-border, 2px) solid var(--accent--canvas--crosshair);
      border-radius: 2px;
    }
    .frame-group-frame.selected::before { top: -4px; left: -4px; }
    .frame-group-frame.selected::after  { top: -4px; right: -4px; }
    .frame-group-frame-label {
      position: absolute;
      top: -18px;
      left: 0;
      font-size: 10px;
      font-weight: 500;
      color: var(--content--muted);
      font-family: 'Inter', sans-serif;
    }
    .frame-group-frame:hover .frame-group-frame-label { color: var(--accent--canvas--crosshair); }
    .frame-group-frame.selected .frame-group-frame-label { color: var(--accent--canvas--crosshair); }
    .frame-group-frame-content {
      position: absolute;
      inset: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .frame-group-frame-content svg {
      width: 100%;
      height: 100%;
      opacity: 0.2;
    }

    /* Ghost layer */
    .frame-ghost {
      position: absolute;
      inset: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    /* ─── Secondary Toolbar (above main toolbar) ─── */
    .secondary-toolbar {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 6px;
      background: var(--surface--subtle);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border--default);
      border-radius: var(--radius--container);
      box-shadow: var(--shadow--toolbar);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s cubic-bezier(0.4,0,0.2,1);
    }
    .secondary-toolbar.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    .sec-tb-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 500;
      color: var(--content--primary);
      border-radius: var(--radius--control);
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
      user-select: none;
    }
    .sec-tb-btn:hover { background: var(--surface--controls--button-hover); }
    .sec-tb-btn.accent { color: var(--accent--text); }
    .sec-tb-btn.accent:hover { background: var(--accent--subtle); color: var(--accent--subtle-foreground); }
    .sec-tb-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    .sec-tb-sep {
      width: 1px;
      height: 26px;
      background: var(--border--divider);
      border-radius: var(--radius--pill);
      flex-shrink: 0;
    }

    /* ─── Properties Panel (SidebarPanel pattern) ─── */
    .properties-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 280px;
      height: 100vh;
      background: var(--surface--base);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-left: 0.5px solid var(--border--subtle);
      z-index: 90;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
      overflow: clip;
    }
    .properties-panel.visible { transform: translateX(0); }

    /* SidebarPanelHeader */
    .prop-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      border-bottom: 0.5px solid var(--border--subtle);
      flex-shrink: 0;
    }
    .prop-header-title {
      font-size: 12px;
      font-weight: 500;
      color: var(--content--primary);
    }
    .prop-close {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius--control);
      cursor: pointer;
      color: var(--content--secondary);
      transition: background 0.12s;
    }
    .prop-close:hover { background: var(--surface--controls--button-hover); color: var(--content--primary); }

    /* Scrollable content area */
    #panelContent {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    /* SidebarSection */
    .prop-section {
      padding: 8px 12px 12px;
      border-bottom: 0.5px solid var(--border--subtle);
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: stretch;
    }
    .prop-section-title {
      font-size: 10px;
      font-weight: 500;
      line-height: 12px;
      letter-spacing: 0.2px;
      color: var(--content--secondary);
      margin-bottom: 0;
    }
    .prop-row {
      display: flex;
      gap: 8px;
      margin-bottom: 0;
    }
    .prop-row:last-child { margin-bottom: 0; }

    .prop-field {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    /* ControlLabel — 8px like the repo */
    .prop-field-label {
      font-size: 8px;
      font-weight: 500;
      line-height: 1;
      color: var(--content--secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .prop-field-input {
      height: 28px;
      padding: 0 8px;
      background: var(--surface--controls--input-default);
      border: 0.5px solid var(--border--default);
      border-radius: var(--radius--control);
      color: var(--content--primary);
      font-size: 11px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.12s, box-shadow 0.12s;
    }
    .prop-field-input:hover { border-color: var(--border--strong); }
    .prop-field-input:focus { border-color: var(--border--focus); box-shadow: inset 0 0 0 1px var(--border--focus); }
    .prop-field-input::placeholder { color: var(--content--muted); }

    .prop-field-suffix {
      position: relative;
    }
    .prop-field-suffix .prop-field-input { padding-right: 24px; }
    .prop-field-suffix::after {
      content: attr(data-suffix);
      position: absolute;
      right: 8px;
      bottom: 6px;
      font-size: 10px;
      font-weight: 500;
      color: var(--content--secondary);
      pointer-events: none;
    }

    .prop-field-select {
      height: 28px;
      padding: 0 8px;
      background: var(--surface--controls--input-default);
      border: 0.5px solid var(--border--default);
      border-radius: var(--radius--control);
      color: var(--content--primary);
      font-size: 11px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
      background-image: url("data:image/svg+xml,%3Csvg width='6' height='4' viewBox='0 0 6 4' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0.5 0.5L3 3L5.5 0.5' stroke='%23a1a3a5' stroke-width='1' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 8px center;
      padding-right: 24px;
      transition: border-color 0.12s, box-shadow 0.12s;
    }
    .prop-field-select:hover { border-color: var(--border--strong); }
    .prop-field-select:focus { border-color: var(--border--focus); box-shadow: inset 0 0 0 0.5px var(--border--focus); }

    /* ─── Frame floor plan content (decorative) ─── */
    .floor-plan-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .floor-plan-walls {
      stroke: #2a2a2a;
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .floor-plan-thin {
      stroke: #999;
      fill: none;
      stroke-width: 1;
    }
    .floor-plan-fill {
      fill: #ececea;
      stroke: none;
    }
    .floor-plan-label {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      fill: #aaa;
    }
    .floor-plan-dim {
      font-family: 'Inter', sans-serif;
      font-size: 8px;
      fill: #bbb;
    }

    /* ── Section Cut Mode ── */
    body.mode-section-cut { cursor: crosshair; }
    body.mode-section-cut .toolbar-container,
    body.mode-section-cut .canvas-frame,
    body.mode-section-cut .floor-selector-bar,
    body.mode-section-cut .secondary-toolbar,
    body.mode-section-cut .properties-panel { cursor: default; }

    /* Active mode indicator on toolbar button */
    .sec-tb-btn.active-mode {
      background: var(--surface--controls--input-default);
      box-shadow: inset 0 0 0 1px var(--border--switch-button);
    }

    /* Canvas dim overlay when in section cut mode */
    .canvas-dim {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      z-index: 54;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s;
    }
    .canvas-dim.visible { opacity: 1; }

    /* Instruction bar — floating at top center */
    .mode-instruction-bar {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      background: var(--surface--base);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--accent--border);
      border-radius: var(--radius--container);
      box-shadow: var(--shadow--toolbar);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s cubic-bezier(0.25,1,0.5,1);
      font-family: 'Inter', sans-serif;
    }
    .mode-instruction-bar.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }
    .mode-instruction-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent--solid);
      flex-shrink: 0;
      animation: mode-dot-pulse 1.5s ease-in-out infinite;
    }
    @keyframes mode-dot-pulse {
      0%, 100% { opacity: 0.5; box-shadow: 0 0 0 0 transparent; }
      50% { opacity: 1; box-shadow: 0 0 0 4px var(--accent--subtle); }
    }
    .mode-instruction-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent--text);
      white-space: nowrap;
    }
    .mode-instruction-text {
      font-size: 11px;
      color: var(--content--secondary);
      white-space: nowrap;
    }
    .mode-instruction-esc {
      font-size: 10px;
      color: var(--content--disabled);
      background: var(--surface--controls--input-default);
      padding: 2px 8px;
      border-radius: var(--radius--control);
      white-space: nowrap;
      margin-left: 4px;
    }

    .section-cut-line {
      position: absolute;
      pointer-events: none;
      z-index: 56;
    }
    .section-cut-line line { stroke: var(--accent--canvas--crosshair); stroke-width: 2; stroke-linecap: round; }
    .section-cut-line circle { fill: var(--accent--canvas--dot); }
    .section-cut-preview { stroke: var(--accent--canvas--guide); stroke-width: 1.5; stroke-dasharray: 4 4; }



    .section-cut-mark {
      position: absolute;
      z-index: 2;
      pointer-events: none;
    }
    .section-cut-mark line { stroke: var(--accent--canvas--guide); stroke-width: 1.5; stroke-linecap: round; }
    .section-cut-mark text { fill: var(--accent--canvas--badge-text); font-size: 9px; font-weight: 600; font-family: 'Inter', sans-serif; }

    /* ── Elevation Compass ── */
    .elevation-compass {
      position: absolute;
      z-index: 57;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .elevation-compass.visible { opacity: 1; pointer-events: auto; }
    .compass-ring {
      position: absolute;
      border: 1.5px solid var(--border--default);
      border-radius: 50%;
    }
    .compass-marker {
      position: absolute;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--border--muted);
      border: 1.5px solid var(--border--subtle);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      font-size: 8px;
      font-weight: 700;
      color: var(--content--disabled);
      font-family: 'Inter', sans-serif;
    }
    .compass-marker:hover {
      background: var(--accent--canvas--guide-fill);
      border-color: var(--accent--canvas--guide);
      color: var(--accent--canvas--crosshair);
    }
    .north-indicator {
      position: absolute;
      top: -20px;
      right: 30px;
      font-size: 9px;
      font-weight: 700;
      color: var(--accent--canvas--crosshair);
      background: var(--surface--subtle);
      border: 1px solid var(--border--default);
      border-radius: var(--radius--control);
      padding: 2px 5px;
      cursor: pointer;
      z-index: 2;
      backdrop-filter: blur(8px);
    }
    .north-indicator:hover { background: var(--surface--controls--button-hover); }

    /* ── Generated Frames ── */
    .generated-frame {
      position: absolute;
      z-index: 55;
      border: 1px solid rgba(255,255,255,0.08);
      background: #f5f5f3;
      cursor: default;
      transition: border-color 0.15s;
    }
    .generated-frame:hover { border-color: var(--accent--canvas--guide); }
    .generated-frame.selected { border-color: var(--accent--canvas--crosshair); }
    .generated-frame.selected::before,
    .generated-frame.selected::after {
      content: '';
      position: absolute;
      width: var(--handle-size, 8px); height: var(--handle-size, 8px);
      background: #fff;
      border: var(--handle-border, 2px) solid var(--accent--canvas--crosshair);
      border-radius: 2px;
    }
    .generated-frame.selected::before { top: -4px; left: -4px; }
    .generated-frame.selected::after  { top: -4px; right: -4px; }
    .generated-frame-label {
      position: absolute;
      top: -20px;
      left: 0;
      font-size: 11px;
      font-weight: 500;
      color: var(--content--muted);
      font-family: 'Inter', sans-serif;
      white-space: nowrap;
    }
    .generated-frame:hover .generated-frame-label { color: var(--accent--canvas--crosshair); }
    .generated-frame.selected .generated-frame-label { color: var(--accent--canvas--crosshair); }

    /* ─── Properties Panel: Redesigned ─── */
    /* SidebarSection title row — 28px height */
    .prop-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 28px;
      flex-shrink: 0;
      width: 100%;
    }
    .prop-section-name {
      font-size: 11px;
      font-weight: 500;
      line-height: 16px;
      color: var(--content--primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .prop-section-name .floor-highlight {
      color: var(--accent--text);
    }
    .prop-section-actions {
      display: flex;
      gap: 4px;
    }
    .prop-section-action-btn {
      width: 28px;
      height: 28px;
      border-radius: var(--radius--control);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--content--secondary);
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .prop-section-action-btn:hover {
      background: var(--surface--controls--button-hover);
      color: var(--content--primary);
    }
    .prop-section-action-btn svg { width: 14px; height: 14px; }
    .prop-format-dropdown {
      height: 28px;
      padding: 0 8px;
      background: var(--surface--controls--input-default);
      border: 0.5px solid var(--border--default);
      border-radius: var(--radius--control);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: var(--content--primary);
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: border-color 0.12s;
    }
    .prop-format-dropdown:hover { border-color: var(--border--strong); }
    .prop-format-icon {
      width: 14px;
      height: 18px;
      border: 1px solid var(--border--strong);
      border-radius: var(--radius--element);
      margin-right: 6px;
      flex-shrink: 0;
    }
    .prop-format-dropdown .chevron {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--content--secondary);
      flex-shrink: 0;
      transition: transform 0.15s;
    }
    .prop-format-dropdown .chevron svg {
      width: 6px;
      height: 4px;
    }
    .prop-size-row {
      display: flex;
      gap: 4px;
      align-items: flex-end;
      width: 100%;
    }
    .prop-size-row .prop-field { flex: 1; }
    .prop-size-row .prop-field-input { width: 100%; }
    .prop-size-row .prop-swap-btn { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
    .prop-swap-btn {
      width: 20px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--content--disabled);
      cursor: pointer;
      font-size: 12px;
      flex-shrink: 0;
      transition: color 0.12s;
    }
    .prop-swap-btn:hover { color: var(--content--secondary); }
    .prop-scale-compound {
      display: flex;
      align-items: center;
    }
    .prop-scale-compound .prop-field-input {
      border-radius: var(--radius--control) 0 0 var(--radius--control);
      border-right: none;
    }
    .prop-scale-suffix {
      height: 28px;
      padding: 0 6px;
      background: var(--border--muted);
      border: 0.5px solid var(--border--default);
      border-left: none;
      border-radius: 0 var(--radius--control) var(--radius--control) 0;
      display: flex;
      align-items: center;
      font-size: 10px;
      color: var(--content--secondary);
      font-family: 'Inter', sans-serif;
    }
    .prop-info-icon {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--border--muted);
      border: 1px solid var(--border--default);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      color: var(--content--disabled);
      cursor: help;
      margin-left: 4px;
      position: relative;
    }
    .prop-info-icon:hover { background: var(--surface--controls--button-hover); color: var(--content--secondary); }
    .prop-info-tooltip {
      display: none;
    }
    .prop-floor-actions {
      display: flex;
      gap: 8px;
      width: 100%;
    }
    .prop-floor-action {
      flex: 1;
      height: 28px;
      border-radius: var(--radius--control);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-size: 11px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .prop-floor-action.duplicate {
      background: var(--surface--controls--button-default);
      border: 0.5px solid var(--border--subtle);
      color: var(--content--primary);
    }
    .prop-floor-action.duplicate:hover { background: var(--surface--controls--button-hover); }
    .prop-floor-action.delete {
      background: var(--status--danger--subtle);
      border: 0.5px solid rgba(225,25,25,0.15);
      color: var(--status--danger--text);
    }
    .prop-floor-action.delete:hover { background: rgba(225,25,25,0.1); }
    .prop-color-swatch {
      width: 20px;
      height: 20px;
      border-radius: var(--radius--element);
      border: 1px solid var(--border--default);
      flex-shrink: 0;
      cursor: pointer;
    }
    .prop-toggle-group {
      display: flex;
      gap: 0;
      background: var(--surface--controls--input-inset);
      border-radius: var(--radius--control);
    }
    .prop-toggle-btn {
      flex: 1;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      color: var(--content--secondary);
      background: transparent;
      border: 1px solid transparent;
      border-radius: var(--radius--control);
    }
    .prop-toggle-btn:first-child { border-radius: var(--radius--control); }
    .prop-toggle-btn:last-child { border-radius: var(--radius--control); }
    .prop-toggle-btn.active {
      background: var(--surface--controls--button-muted);
      color: var(--content--primary);
      border-color: var(--border--switch-button);
    }
    .prop-export-card {
      padding: 10px;
      background: var(--surface--controls--input-default);
      border: 0.5px solid var(--border--subtle);
      border-radius: var(--radius--component);
      margin-bottom: 8px;
    }
    .prop-export-row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 8px;
    }
    .prop-export-row:last-child { margin-bottom: 0; }
    .prop-export-dropdown {
      flex: 1;
      height: 28px;
      padding: 0 8px;
      background: var(--surface--controls--input-default);
      border: 0.5px solid var(--border--default);
      border-radius: var(--radius--control);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: var(--content--primary);
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      position: relative;
      transition: border-color 0.12s;
    }
    .prop-export-dropdown:hover { border-color: var(--border--strong); }
    .prop-export-dropdown .chevron {
      display: flex;
      align-items: center;
      color: var(--content--secondary);
      flex-shrink: 0;
    }
    .prop-export-dropdown .chevron svg { width: 6px; height: 4px; }
    .prop-export-remove {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--content--disabled);
      cursor: pointer;
      font-size: 10px;
      flex-shrink: 0;
      border-radius: var(--radius--element);
      transition: background 0.12s, color 0.12s;
    }
    .prop-export-remove:hover { color: var(--content--secondary); background: var(--surface--controls--button-hover); }
    .prop-export-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .prop-export-toggle-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--content--secondary);
    }
    .prop-export-toggle-switch {
      width: 34px;
      height: 20px;
      border-radius: 16px;
      background: var(--surface--controls--input-inset);
      border: 1px solid var(--border--default);
      position: relative;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .prop-export-toggle-switch:hover { border-color: var(--border--strong); }
    .prop-export-toggle-switch.on { background: var(--surface--controls--button-default); }
    .prop-export-toggle-switch::after {
      content: '';
      width: 16px;
      height: 16px;
      border-radius: 16px;
      background: var(--surface--controls--toggle-knob);
      box-shadow: 0px 1px 4px 0px rgba(0,0,0,0.35);
      position: absolute;
      top: 1px;
      left: 1px;
      transition: left 0.15s;
    }
    .prop-export-toggle-switch.on::after { left: 15px; }
    .prop-export-btn {
      height: 28px;
      background: var(--surface--controls--button-default);
      border: 0.5px solid var(--border--subtle);
      border-radius: var(--radius--control);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 500;
      color: var(--content--primary);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background 0.12s, color 0.12s;
    }
    .prop-export-btn:hover { background: var(--surface--controls--button-hover); }

    /* Export dropdown menu (appears on click) */
    .prop-export-dropdown-menu {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      margin-top: 4px;
      background: var(--surface--base);
      border: 1px solid var(--border--default);
      border-radius: var(--radius--component);
      padding: 4px;
      z-index: 300;
      box-shadow: var(--shadow--toolbar);
    }
    .prop-export-dropdown-item {
      height: 32px;
      padding: 4px 8px;
      border-radius: var(--radius--control);
      display: flex;
      align-items: center;
      font-size: 11px;
      color: var(--content--primary);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background 0.1s, color 0.1s;
    }
    .prop-export-dropdown-item:hover { background: var(--accent--solid); color: var(--accent--solid-foreground); }
    .prop-export-dropdown-item.active { color: var(--accent--text); }
    .prop-add-export {
      width: 28px;
      height: 28px;
      border-radius: var(--radius--control);

      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--content--secondary);

      transition: background 0.12s, color 0.12s;
    }
    .prop-add-export:hover { background: var(--surface--controls--button-hover); color: var(--content--primary); }
    .prop-add-export svg { width: 14px; height: 14px; }

    // ── Open search ───────────────────────────────────────────────────────
    // All three animations run simultaneously with the same timing:
    //   1. Search pill: 52px → toolsWidth (expands)
    //   2. Tools pill: toolsWidth → 52px (shrinks, clips content)
    //   3. Tools inner: translateX shifts so active tool stays visible
    // The active tool stays inside the tools pill — it slides into the
    // remaining 52px window as neighboring tools get clipped away.
    function openSearch() {
      if (isSearchOpen) return;
      isSearchOpen = true;
      searchPill.classList.remove('closing');  // clean up if reopened mid-animation

      if (toolsPillWidth === 0) {
        toolsPillWidth = toolsPill.getBoundingClientRect().width;
      }

      // Detect whether active tool has a chevron — if so, widen collapsed pill
      const activeToolBtn = toolsPill.querySelector(`.tool-btn[data-tool="${activeToolId}"]`);
      const hasChevron = !!activeToolBtn.querySelector('.tool-chevron');
      const collapsedW = hasChevron ? 58 : 48;  // 36 icon + 1 gap + 14 chevron + 7 pad  vs  36 icon + 12 pad
      const targetOffset = hasChevron ? 4 : (48 - 36) / 2;

      // Calculate how far to translate inner so active tool is visible in collapsed pill
      const activeIcon = toolsPill.querySelector(`.tool-btn[data-tool="${activeToolId}"] .tool-icon`);
      const pillRect = toolsPill.getBoundingClientRect();
      const iconRect = activeIcon.getBoundingClientRect();
      const iconOffset = iconRect.left - pillRect.left;
      const tx = -(iconOffset - targetOffset);

      // Pin current width so transition has a start value
      toolsPill.style.width = toolsPillWidth + 'px';
      void toolsPill.offsetWidth;

      // Total stays constant: search grows by what tools shrinks
      const expandedSearchW = toolsPillWidth + 48 - collapsedW;

      // Fire all animations simultaneously
      searchPill.style.width = expandedSearchW + 'px';
      searchPill.classList.add('open');
      toolsPill.style.width = collapsedW + 'px';
      toolsInner.style.transform = `translateX(${tx}px)`;

      // Slide context bar to the right of the palette (if visible)
      if (polyCtxBar.classList.contains('visible')) {
        const finalSearchRight = searchPill.getBoundingClientRect().left + expandedSearchW;
        const ctxTx = finalSearchRight + 12 - window.innerWidth / 2;
        polyCtxBar.style.transform = `translateX(${ctxTx}px) translateY(0)`;
      }

      // Set placeholder based on active mode
      commandInput.placeholder = 'Search commands & assets…';

      // After width animation: allow overflow, then show command palette
      openSearchTimer = setTimeout(() => {
        openSearchTimer = null;
        searchPill.style.overflow = 'visible';
        renderPalette('');
      }, 350);
      openSearchFocusTimer = setTimeout(() => { openSearchFocusTimer = null; commandInput.focus(); }, 200);
    }

    // ── Close palette only (dropdown hides, search bar stays expanded) ────
    function closePalette() {
      commandDropdown.classList.remove('visible');
      searchPill.style.overflow = 'hidden';   // clip any dropdown remnants
      cancelAIStream();
      // Slide context bar back to center
      polyCtxBar.style.transform = '';
    }

    // ── Close search (full collapse — palette + search bar) ──────────────
    function closeSearch() {
      if (!isSearchOpen) return;
      isSearchOpen = false;

      // Cancel any pending openSearch timers (user closed before animation finished)
      if (openSearchTimer)      { clearTimeout(openSearchTimer);      openSearchTimer = null; }
      if (openSearchFocusTimer) { clearTimeout(openSearchFocusTimer); openSearchFocusTimer = null; }

      // Clip dropdown immediately
      searchPill.style.overflow = 'hidden';
      commandInput.value = '';
      commandDropdown.classList.remove('visible');
      cancelAIStream();

      // Switch from .open to .closing — keeps icon at flex-start position
      searchPill.classList.remove('open');
      searchPill.classList.add('closing');

      // Animate width shrink + tools expand simultaneously
      searchPill.style.width = '48px';
      toolsPill.style.width = toolsPillWidth + 'px';
      toolsInner.style.transform = 'translateX(0)';

      // Slide context bar back to center
      polyCtxBar.style.transform = '';

      setTimeout(() => {
        searchPill.classList.remove('closing');
        toolsPill.style.width = '';

    function renderToolItem(t) {
      const iconSvg = CMD_ICONS[t.icon] || CMD_ICONS.select;
      const isActive = t.id === activeToolId;

    // Silent tool switch: update active icon in collapsed toolbar, no animation
    function selectToolFromPalette(id) {
      setActiveTool(id);
      if (isSearchOpen) {
        // Detect chevron on the NEW tool and recalculate collapsed width
        const newToolBtn = toolsPill.querySelector(`.tool-btn[data-tool="${id}"]`);
        const hasChevron = !!(newToolBtn && newToolBtn.querySelector('.tool-chevron'));
        const collapsedW = hasChevron ? 58 : 48;
        const targetOffset = hasChevron ? 4 : (48 - 36) / 2;

        // Recalculate translateX for the new active tool — instant, no transition
        const activeIcon = toolsPill.querySelector(`.tool-btn[data-tool="${id}"] .tool-icon`);
        if (activeIcon) {
          // getBoundingClientRect() returns visual position INCLUDING the current
          // transform. We must subtract the existing translateX to recover the
          // icon's natural (untransformed) offset, then compute the new shift.
          const currentTx = parseFloat(
            (toolsInner.style.transform.match(/translateX\(([-\d.e]+)px\)/) || [])[1] || '0'
          );
          const pillRect     = toolsPill.getBoundingClientRect();
          const iconRect     = activeIcon.getBoundingClientRect();
          const naturalOffset = (iconRect.left - pillRect.left) - currentTx;
          const tx = -(naturalOffset - targetOffset);
          toolsInner.style.transition = 'none';
          toolsInner.style.transform  = `translateX(${tx}px)`;
          void toolsInner.offsetWidth; // flush layout
          toolsInner.style.transition = '';

          // Resize pills if chevron state changed
          const expandedSearchW = toolsPillWidth + 48 - collapsedW;
          toolsPill.style.width  = collapsedW + 'px';
          searchPill.style.width = expandedSearchW + 'px';
        }
        // Re-render palette so active dot moves to the new tool (keep input value)
        renderPalette(commandInput.value);
      }

    function renderCommandItem(c) {
      const iconSvg = CMD_ICONS[c.icon] || CMD_ICONS.select;
      const modeClass = c.mode ? ` cmd-${c.mode}` : '';
      return `<div class="command-item${modeClass}" data-cmd-name="${c.name}" data-cmd-icon="${c.icon || 'select'}" ${c.mode ? `data-cmd-mode="${c.mode}"` : ''}>

    }

      const iconSvg = ASSET_ICONS[a.icon] || ASSET_ICONS.door;
      return `<div class="asset-item" data-asset-name="${a.name}" data-asset-icon="${a.icon || 'door'}" data-asset-tag="${a.tag || ''}">

    }

    // ── Recent usage + frequency tracking ────────────────────────────────
    function trackRecentUse(item) {
      usageCount[item.name] = (usageCount[item.name] || 0) + 1;
      recentlyUsed = recentlyUsed.filter(r => r.name !== item.name);
      recentlyUsed.unshift(item);
      if (recentlyUsed.length > MAX_RECENT) recentlyUsed.pop();
    }

    function sortByUsage(items) {
      return [...items].sort((a, b) => {
        const countDiff = (usageCount[b.name] || 0) - (usageCount[a.name] || 0);
        if (countDiff !== 0) return countDiff;
        return a.name.localeCompare(b.name);
      });
    }

    function matchesFilter(item, f) {
      if (item.name.toLowerCase().includes(f)) return true;
      if (item.aliases && item.aliases.some(a => a.toLowerCase().includes(f))) return true;
      return false;
    }
